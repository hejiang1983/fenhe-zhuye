<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观察物体（三）</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 0;
            background-color: white;
        }
        h1 {
            margin: 0;
            padding: 15px 0;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            width: 100%;
        }
        .tabs {
            display: flex;
            flex-direction: column;
            width: 150px;
            background-color: #f1f1f1;
            border-right: 1px solid #ddd;
        }
        .tab {
            padding: 15px 10px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            transition: all 0.3s;
            text-align: center;
        }
        .tab:hover {
            background-color: #e1e1e1;
        }
        .tab.active {
            background-color: #3498db;
            color: white;
        }
        .tab-content-container {
            flex: 1;
            overflow: hidden;
        }
        .tab-content {
            display: none;
            height: 100%;
            width: 100%;
        }
        .tab-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>观察物体（三）</h1>
        <div style="display: flex; flex: 1;">
            <div class="tabs">
            <div class="tab active" onclick="openTab(event, 'object1')">观察物体1</div>
            <div class="tab" onclick="openTab(event, 'object2')">观察物体2</div>
            <div class="tab" onclick="openTab(event, 'object3')">观察物体3</div>
        </div>
        
        <div class="tab-content-container">
            <div id="object1" class="tab-content active">
            <iframe data-src="观察物体1.html"></iframe>
        </div>
        
            <div id="object2" class="tab-content">
            <iframe data-src="观察物体2.html"></iframe>
        </div>
        
            <div id="object3" class="tab-content">
            <iframe data-src="观察物体3.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Load default tab content when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const defaultTab = document.querySelector('.tab-content.active iframe');
            if (defaultTab && !defaultTab.src && defaultTab.dataset.src) {
                defaultTab.src = defaultTab.dataset.src;
            }
        });

        function openTab(evt, tabName) {
            // Hide all tab contents
            const tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            
            // Remove active class from all tabs
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            
            // Show current tab and add active class
            const activeTab = document.getElementById(tabName);
            activeTab.classList.add("active");
            evt.currentTarget.classList.add("active");
            
            // Lazy load iframe content
            const iframe = activeTab.querySelector("iframe");
            if (iframe && !iframe.src && iframe.dataset.src) {
                iframe.src = iframe.dataset.src;
            }
        }
    </script>
</body>
</html>
