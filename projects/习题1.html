    &lt;script&gt;
        let currentStep = 0;
        const totalSteps = 4;
        const slots = document.querySelectorAll('.card-slot');
        const cards = document.querySelectorAll('.number-card');
        const abacusData = { 1000: 0, 100: 0, 10: 0, 1: 0 };

        const audios = {
            intro: document.getElementById('audioIntro'),
            low: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/wKnQR8b2NEGpk8dwuwNTqm.mp3'),
            high: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/znCPTdBZWMPDUiJDT5M3uQ.mp3'),
            littleHigh: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/QKqQRUQRpL5wez5PdZC5vL.mp3'),
            guess1: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/fYXk7ghdwCJeBbZ2sjZiCW.mp3'),
            guess2: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/ztYdU6URXukXet3ue6doCQ.mp3'),
            guess3: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/73xBjHGxRhYeNF3qpesPxF.mp3'),
            correct: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/c2zywgaKbFPYTeX4YzsUaZ.mp3'),
            // 基础发音
            d0: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/PaZuQkkHjCcGawHjTt5pCW.mp3'),
            d1: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/NUP9CVtYwDjeJC7auCEsEV.mp3'),
            d2: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/etGkAixZR5ZuUWxGnz2dYa.mp3'),
            d3: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/8uBw2UBxh8iZ87V7droEJZ.mp3'),

            d5: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/wGrRLBMZrGMtocXDuRW8QN.mp3'),
            d6: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/cSQzW7MYCaXtgPHhqZcjtm.mp3'),
            d7: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/2E2xgB4wTauW9CNzHVHW5k.mp3'),
            d8: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/wwiaQKcqmVk7tr2adQgEPi.mp3'),
            d9: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Nou2UinB7JG95AxJ9x4Z49.mp3'),
            u10: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/kR9bmsTTt9JtbYd3G6RXuU.mp3'),
            u100: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/XPam2KNKZgjEhvCqfP6qsT.mp3'),
            u1000: new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/3EMzjLccizc8ASGvrsjDmV.mp3')
        };

        document.getElementById('nextStep').addEventListener('click', () =&gt; {
            if (currentStep &lt; totalSteps - 1) changeStep(currentStep + 1);
        });

        document.getElementById('prevStep').addEventListener('click', () =&gt; {
            if (currentStep &gt; 0) changeStep(currentStep - 1);
        });

        function changeStep(step) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            currentStep = step;
            document.getElementById(`step${currentStep}`).classList.add('active');
            
            const nextBtn = document.getElementById('nextStep');
            const prevBtn = document.getElementById('prevStep');
            
            prevBtn.classList.toggle('opacity-50', currentStep === 0);
            prevBtn.classList.toggle('cursor-not-allowed', currentStep === 0);
            
            if (currentStep === totalSteps - 1) {
                nextBtn.innerText = '完成';
                startGuessGame();
            } else {
                nextBtn.innerText = '下一步';
            }
        }

        function startLesson() {
            audios.intro.play();
            changeStep(1);
        }

        // --- Step 1: Card Logic ---
        let draggedCard = null;
        cards.forEach(card =&gt; {
            card.addEventListener('dragstart', (e) =&gt; {
                draggedCard = card;
                setTimeout(() =&gt; card.style.opacity = '0.5', 0);
            });
            card.addEventListener('dragend', () =&gt; draggedCard.style.opacity = '1');
        });

        slots.forEach(slot =&gt; {
            slot.addEventListener('dragover', (e) =&gt; e.preventDefault());
            slot.addEventListener('drop', (e) =&gt; {
                e.preventDefault();
                if (slot.children.length === 0) {
                    slot.appendChild(draggedCard);
                    updateNumber();
                }
            });
        });

        function updateNumber() {
            let numStr = '';
            slots.forEach(slot =&gt; numStr += slot.children.length &gt; 0 ? slot.children[0].dataset.val : '-');
            document.getElementById('currentNumber').innerText = numStr;
            const isComplete = !numStr.includes('-');
            document.getElementById('numberReading').innerText = isComplete ? readNumber(numStr) : '请拖动卡片组合数字';
            
            if (isComplete) {
                playNumberAudio(numStr);
            }
        }

        async function playNumberAudio(num) {
            const units = ['', '10', '100', '1000'];
            let audioQueue = [];
            let zero = false;
            
            for (let i = 0; i &lt; 4; i++) {
                let d = parseInt(num[i]);
                let unit = units[3 - i];
                
                if (d &gt; 0) {
                    if (zero) {
                        audioQueue.push(audios.d0);
                        zero = false;
                    }
                    audioQueue.push(audios['d' + d]);
                    if (unit) audioQueue.push(audios['u' + unit]);
                } else {
                    if (i &lt; 3) zero = true;
                }
            }
            
            if (audioQueue.length === 0) audioQueue.push(audios.d0);

            for (let audio of audioQueue) {
                await new Promise(resolve =&gt; {
                    audio.currentTime = 0;
                    audio.playbackRate = 1.3; // 加快语速
                    audio.play();
                    audio.onended = resolve;
                });
            }
        }

        function readNumber(num) {
            const units = ['', '十', '百', '千'], digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
            let res = '', zero = false;
            for (let i = 0; i &lt; 4; i++) {
                let d = parseInt(num[i]), unit = units[3 - i];
                if (d &gt; 0) { if (zero) { res += '零'; zero = false; } res += digits[d] + unit; }
                else if (i &lt; 3) zero = true;
            }
            return res === '' ? '零' : res.replace(/零+$/, '');
        }

        function showMaxMin(type) {
            resetCards();
            const vals = [0, 3, 6, 8];
            let sorted = type === 'max' ? vals.sort((a, b) =&gt; b - a) : vals.sort((a, b) =&gt; a - b);
            if (type === 'min' &amp;&amp; sorted[0] === 0) {
                for (let i = 1; i &lt; sorted.length; i++) if (sorted[i] !== 0) { [sorted[0], sorted[i]] = [sorted[i], sorted[0]]; break; }
            }
            const num = sorted.join('');
            const approx = Math.round(parseInt(num) / 1000) * 1000;
            document.getElementById(type === 'max' ? 'q1_max' : 'q1_min').innerText = num;
            document.getElementById(type === 'max' ? 'q1_max_approx' : 'q1_min_approx').innerText = approx;
            sorted.forEach((val, i) =&gt; slots[i].appendChild(document.querySelector(`.number-card[data-val=&quot;${val}&quot;]`)));
            updateNumber();
        }

        function checkQ2(type) {
            const val = document.getElementById(type === 'noZero' ? 'q2_noZero' : 'q2_oneZero').value;
            if (val.split('').sort().join('') !== '0368' || val[0] === '0') { alert('请检查：是否使用了0,3,6,8？最高位是否为0？'); return; }
            if (type === 'noZero') {
                if (val.endsWith('0')) { alert('正确！末尾有0不读出来。'); document.getElementById('q2_noZero_res').innerText = val; }
                else alert('不对哦，末尾不是0的话，中间的0是要读出来的。');
            } else {
                if (!val.endsWith('0')) { alert('正确！0在中间要读出来。'); document.getElementById('q2_oneZero_res').innerText = val; }
                else alert('不对哦，0在末尾是不读的。');
            }
        }

        function playCurrentNumber() {
            let numStr = '';
            slots.forEach(slot =&gt; numStr += slot.children.length &gt; 0 ? slot.children[0].dataset.val : '-');
            if (!numStr.includes('-')) {
                playNumberAudio(numStr);
            } else {
                alert('请先摆好4张卡片哦！');
            }
        }

        function resetCards() { cards.forEach(card =&gt; document.getElementById('cardContainer').appendChild(card)); updateNumber(); }

        // --- Step 2: Abacus Logic ---
        function setAbacusTo(num) {
            resetAbacus();
            const s = num.toString().padStart(4, '0');
            [1000, 100, 10, 1].forEach((d, i) =&gt; abacusData[d] = parseInt(s[i]));
            renderAbacus();
        }

        function renderAbacus() {
            let total = 0, unitHTML = '';
            const unitNames = {1000:'千', 100:'百', 10:'十', 1:'个'};
            for (let digit in abacusData) {
                const container = document.querySelector(`.rod[data-digit=&quot;${digit}&quot;] .bead-container`);
                container.innerHTML = '';
                for (let i = 0; i &lt; abacusData[digit]; i++) {
                    const bead = document.createElement('div'); bead.className = 'bead'; container.appendChild(bead);
                }
                total += abacusData[digit] * parseInt(digit);
                if(abacusData[digit] &gt; 0) unitHTML += `&lt;div&gt;${unitNames[digit]}位上有 &lt;span class=&quot;font-bold text-[#FF6421]&quot;&gt;${abacusData[digit]}&lt;/span&gt; 个${unitNames[digit]}&lt;/div&gt;`;
            }
            document.getElementById('abacusValue').innerText = total;
            document.getElementById('unitDescription').innerHTML = unitHTML || '请拨动珠子...';
            anime({ targets: '.bead', translateY: [20, 0], opacity: [0, 1], delay: anime.stagger(50) });
        }

        function resetAbacus() { for (let digit in abacusData) abacusData[digit] = 0; renderAbacus(); }

        // --- Step 3: Guess Game ---
        async function startGuessGame() {
            const sequence = [
                { id: 'chat1', audio: audios.guess1 }, { id: 'chat2', audio: audios.low },
                { id: 'chat3', audio: audios.guess2 }, { id: 'chat4', audio: audios.high },
                { id: 'chat5', audio: audios.guess3 }, { id: 'chat6', audio: audios.littleHigh }
            ];
            for (let item of sequence) await new Promise(resolve =&gt; {
                anime({ targets: `#${item.id}`, opacity: 1, translateX: [20, 0], duration: 800, easing: 'easeOutExpo', complete: () =&gt; { item.audio.play(); item.audio.onended = resolve; } });
            });
        }

        function checkPrice() {
            const val = document.getElementById('priceInput').value;
            const feedback = document.getElementById('feedback');
            if (val == '6380') {
                feedback.innerText = '🎉 太棒了！完全正确！'; feedback.className = 'mt-4 font-bold text-lg text-green-600';
                document.getElementById('finalPriceDisplay').innerText = '6380'; audios.correct.play();
            } else {
                feedback.innerText = '❌ 再想想看？注意线索哦！'; feedback.className = 'mt-4 font-bold text-lg text-red-500';
            }
        }
        renderAbacus();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>

    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    ">

        max-height: 90vh;
        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;

      <button onclick="closeFullImage()" style="
        position: absolute;
        top: 20px;

        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
