    &lt;!-- 右下角统计 --&gt;

                &lt;span class=&quot;text-slate-400&quot;&gt;总小正方体&lt;/span&gt;
                &lt;span id=&quot;stat-total&quot; class=&quot;font-bold&quot;&gt;27&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;flex justify-between text-sm&quot;&gt;
                &lt;span class=&quot;text-slate-400&quot;&gt;当前显示&lt;/span&gt;

                &lt;p class=&quot;text-xs text-slate-500 mb-1&quot;&gt;验证公式:&lt;/p&gt;

    &lt;!-- 底部提示 --&gt;
    &lt;div class=&quot;fixed bottom-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full flex items-center gap-4 z-10&quot;&gt;
        &lt;div class=&quot;flex items-center gap-2 text-sm&quot;&gt;
            &lt;span class=&quot;text-slate-300&quot;&gt;点击分类后分解，观察内部结构&lt;/span&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        // --- 核心配置 ---
        const CONFIG = {
            colors: {
                base: 0xffffff,
                highlight: {
                    3: 0xef4444, // 顶点-红
                    2: 0x3b82f6, // 棱边-蓝
                    1: 0x22c55e, // 面心-绿
                    0: 0xffffff  // 内部-白
                }
            }
        };

        let scene, camera, renderer, controls;
        let cubeGroup = new THREE.Group();
        let smallCubes = [];
        let N = 3;
        let activeFilter = null;
        let isExploded = false;

        // --- 初始化 ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e17);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            scene.add(cubeGroup);
            createCubes();
            animate();

            window.addEventListener('resize', onWindowResize);
            setupUI();
        }

        // --- 创建立方体阵列 ---
        function createCubes() {
            // 清理旧的
            smallCubes.forEach(c =&gt; cubeGroup.remove(c.mesh));
            smallCubes = [];
            
            const offset = (N - 1) / 2;
            const size = 0.95;

            for (let x = 0; x &lt; N; x++) {
                for (let y = 0; y &lt; N; y++) {
                    for (let z = 0; z &lt; N; z++) {
                        const geometry = new THREE.BoxGeometry(size, size, size);
                        
                        // 计算涂色面数
                        let paintCount = 0;
                        if (x === 0 || x === N - 1) paintCount++;
                        if (y === 0 || y === N - 1) paintCount++;
                        if (z === 0 || z === N - 1) paintCount++;

                        // 默认按照分类涂色
                        const color = CONFIG.colors.highlight[paintCount];
                        const materials = Array(6).fill().map((_, i) =&gt; {
                            let isPaintedFace = false;
                            // 判断当前面是否在正方体外表面
                            if (i === 0 &amp;&amp; x === N - 1) isPaintedFace = true; // Right
                            if (i === 1 &amp;&amp; x === 0) isPaintedFace = true;     // Left
                            if (i === 2 &amp;&amp; y === N - 1) isPaintedFace = true; // Top
                            if (i === 3 &amp;&amp; y === 0) isPaintedFace = true;     // Bottom
                            if (i === 4 &amp;&amp; z === N - 1) isPaintedFace = true; // Front
                            if (i === 5 &amp;&amp; z === 0) isPaintedFace = true;     // Back

                            return new THREE.MeshPhongMaterial({ 
                                color: isPaintedFace ? color : 0xffffff,
                                shininess: 100,
                                transparent: true,
                                opacity: 1
                            });
                        });
                        
                        const mesh = new THREE.Mesh(geometry, materials);
                        mesh.position.set(x - offset, y - offset, z - offset);

                        // 添加黑色边线，方便计数
                        const edges = new THREE.EdgesGeometry(geometry);
                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                        mesh.add(line);

                        smallCubes.push({
                            mesh,
                            gridPos: { x, y, z },
                            originalPos: mesh.position.clone(),
                            paintCount: paintCount
                        });
                        cubeGroup.add(mesh);
                    }
                }
            }
            updateStats();
        }

        // --- 筛选高亮 ---
        function setFilter(type) {
            activeFilter = type;
            
            document.querySelectorAll('.filter-btn').forEach(btn =&gt; {
                btn.classList.toggle('active', btn.dataset.type == type);
            });

            const filterNames = { &quot;3&quot;: &quot;顶点&quot;, &quot;2&quot;: &quot;棱边&quot;, &quot;1&quot;: &quot;面心&quot;, &quot;0&quot;: &quot;内部&quot; };
            document.getElementById('current-filter-name').innerText = filterNames[type] || &quot;无&quot;;

            smallCubes.forEach(cube =&gt; {
                const isMatch = cube.paintCount == type;
                
                // 动画效果：高亮时其他方块保持大小不变，但变为半透明
                cube.mesh.material.forEach(m =&gt; {
                    gsap.to(m, {
                        opacity: isMatch ? 1 : 0.15,
                        duration: 0.4
                    });
                });
                
                // 边线也同步透明度
                cube.mesh.children[0].material.transparent = true;
                gsap.to(cube.mesh.children[0].material, {
                    opacity: isMatch ? 1 : 0.1,
                    duration: 0.4
                });
            });
            updateStats();
        }

        // --- 分解动画 ---
        function explode() {
            isExploded = true;
            
            smallCubes.forEach(cube =&gt; {
                // 向外推移：根据网格位置计算方向
                const dir = cube.originalPos.clone().normalize().multiplyScalar(2.5);
                gsap.to(cube.mesh.position, {
                    x: cube.originalPos.x + dir.x,
                    y: cube.originalPos.y + dir.y,
                    z: cube.originalPos.z + dir.z,
                    duration: 0.8,
                    ease: &quot;power2.out&quot;
                });
            });
            updateStats();
        }

        function restore() {
            isExploded = false;
            smallCubes.forEach(cube =&gt; {
                gsap.to(cube.mesh.position, {
                    x: cube.originalPos.x,
                    y: cube.originalPos.y,
                    z: cube.originalPos.z,
                    duration: 0.6
                });
            });
            updateStats();
        }

        // --- UI 交互 ---
        function setupUI() {
            // 边长滑动
            const slider = document.getElementById('n-slider');
            slider.addEventListener('input', (e) =&gt; {
                N = parseInt(e.target.value);
                document.getElementById('n-value').innerText = `${N} x ${N} x ${N}`;
                resetAll();
            });

            // 筛选
            document.querySelectorAll('.filter-btn').forEach(btn =&gt; {
                btn.addEventListener('click', () =&gt; {
                    const type = btn.dataset.type;
                    if (activeFilter == type) {
                        resetFilter();
                    } else {
                        setFilter(type);
                    }
                });
            });

            // 动作
            document.getElementById('btn-explode').addEventListener('click', explode);
            document.getElementById('btn-restore').addEventListener('click', restore);
            document.getElementById('btn-reset-all').addEventListener('click', resetAll);

            // 规律总结开关
            const ruleBtn = document.getElementById('btn-toggle-rules');
            const rulePanel = document.getElementById('rule-panel');
            ruleBtn.addEventListener('click', () =&gt; {
                rulePanel.classList.toggle('hidden');
                if (!rulePanel.classList.contains('hidden')) {
                    gsap.from(rulePanel, { y: 20, opacity: 0, duration: 0.4, ease: &quot;power2.out&quot; });
                }
            });
        }

        function resetFilter() {
            activeFilter = null;
            document.querySelectorAll('.filter-btn').forEach(btn =&gt; btn.classList.remove('active'));
            document.getElementById('current-filter-name').innerText = &quot;无&quot;;
            
            smallCubes.forEach(cube =&gt; {
                cube.mesh.material.forEach(m =&gt; {
                    gsap.to(m, { opacity: 1, duration: 0.4 });
                });
                cube.mesh.children[0].material.opacity = 1;
            });
            updateStats();
        }

        function resetAll() {
            activeFilter = null;
            isExploded = false;
            document.querySelectorAll('.filter-btn').forEach(btn =&gt; btn.classList.remove('active'));
            document.getElementById('current-filter-name').innerText = &quot;无&quot;;
            createCubes();
        }

        function updateStats() {
            const total = N * N * N;
            const c3 = 8;
            const c2 = Math.max(0, (N - 2) * 12);
            const c1 = Math.max(0, (N - 2) * (N - 2) * 6);
            const c0 = Math.max(0, (N - 2) * (N - 2) * (N - 2));

            document.getElementById('stat-total').innerText = total;
            
            // 更新按钮上的数字
            const badges = document.querySelectorAll('.count-badge');
            badges[0].innerText = c3;
            badges[1].innerText = c2;
            badges[2].innerText = c1;
            badges[3].innerText = c0;

            // 当前显示数量
            let visibleCount = 0;
            if (isExploded) {
                visibleCount = smallCubes.filter(c =&gt; c.paintCount == activeFilter).length;
            } else if (activeFilter !== null) {
                visibleCount = total; // 只是缩放了
            } else {
                visibleCount = total;
            }
            document.getElementById('stat-visible').innerText = visibleCount + '个';

            // 公式
            document.getElementById('stat-formula').innerHTML = `\\( 8 + ${c2} + ${c1} + ${c0} = ${total} \\)`;
            if (window.MathJax) MathJax.typeset();
        }

        function onWindowResize() {

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // 启动
        window.onload = init;
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
