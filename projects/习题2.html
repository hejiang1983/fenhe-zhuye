&lt;script&gt;
    // 页面切换逻辑
    function nextStep(step) {
        document.querySelectorAll('.step-container').forEach(el =&gt; el.classList.remove('step-active'));
        document.getElementById('step' + step).classList.add('step-active');
        
        // 停止所有音频
        document.querySelectorAll('audio').forEach(a =&gt; {
            a.pause();
            a.currentTime = 0;
        });

        // 播放对应语音
        const audio = document.getElementById('audio' + step);
        if (audio) {
            audio.play();
        }

        if (step === 3) initClock();
        if (step === 2) initWater();
    }

    // 估算逻辑
    function playExplanation() {
        const timeline = anime.timeline({
            easing: 'easeOutExpo',
            duration: 1000
        });

        [1, 2, 3].forEach((i, index) =&gt; {
            timeline.add({
                targets: '#box' + i,
                scale: [1, 1.1, 1],
                delay: index * 500
            }).add({
                targets: '#bubble' + i,
                opacity: [0, 1],
                translateY: [10, 0],
                duration: 500,
                offset: '-=500'
            }, '-=500');
        });

        timeline.add({
            targets: '#result1',
            opacity: 1,
            translateY: [20, 0],
            complete: () =&gt; {
                document.getElementById('num1').innerText = '&asymp; 1000人';
                document.getElementById('num2').innerText = '&asymp; 1000人';
                document.getElementById('num3').innerText = '&asymp; 1000人';
            }
        });
    }

    function estimate(el, original) {
        const textEl = el.querySelector('p:last-child');
        anime({
            targets: textEl,
            scale: [1, 1.2, 1],
            duration: 500,
            easing: 'easeInOutQuad',
            complete: () =&gt; {
                textEl.innerText = '&asymp; 1000人';
                checkStep1();
            }
        });
    }

    function checkStep1() {
        const nums = [document.getElementById('num1').innerText, document.getElementById('num2').innerText, document.getElementById('num3').innerText];
        if (nums.every(n =&gt; n.includes('&asymp;'))) {
            anime({
                targets: '#result1',
                opacity: 1,
                translateY: [20, 0],
                duration: 800
            });
        }
    }

    // 分水逻辑
    function initWater() {
        const container = document.getElementById('bottle-container');
        container.innerHTML = '';
        for (let i = 0; i &lt; 7; i++) {
            const img = document.createElement('img');
            img.src = 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/hhpCGVoGUMRUWfYNunC4SS.jpg';
            img.className = 'water-bottle';
            img.id = 'bottle-' + i;
            container.appendChild(img);
        }
    }

    function distributeWater() {
        // 分出4瓶，剩下3瓶
        for (let i = 0; i &lt; 4; i++) {
            anime({
                targets: '#bottle-' + i,
                translateY: 100,
                translateX: (i - 1.5) * 50,
                opacity: 0,
                duration: 1000,
                delay: i * 200,
                easing: 'easeOutExpo'
            });
        }
        anime({
            targets: '#result2',
            opacity: 1,
            delay: 1200
        });
    }

    function resetWater() {
        initWater();
        document.getElementById('family-container').innerHTML = '';
        document.getElementById('explanation-text').innerHTML = '';
    }

    function explainAnswer(peopleCount) {
        resetWater();
        const explanationText = document.getElementById('explanation-text');
        const familyContainer = document.getElementById('family-container');
        
        // 1. 计算分掉的水
        explanationText.innerHTML = `&lt;div class=&quot;math-formula&quot;&gt;7 - 3 = 4 (瓶)&lt;/div&gt;&lt;br&gt;一共分掉了 4 瓶水。`;
        
        // 2. 生成家人
        for(let i=0; i&lt;peopleCount; i++) {
            const member = document.createElement('div');
            member.className = 'family-member text-center';
            member.innerHTML = `&lt;img src=&quot;assets/8e9741a3-d625-4d25-8287-21510b9f02691831副本.png&quot; class=&quot;w-full&quot;&gt;`;
            familyContainer.appendChild(member);
        }

        // 3. 动画序列
        const tl = anime.timeline({ easing: 'easeOutExpo' });
        
        tl.add({
            targets: '.family-member',
            opacity: 1,
            translateY: 0,
            delay: anime.stagger(200)
        })
        .add({
            targets: explanationText,
            opacity: [0, 1],
            update: () =&gt; {
                const perPerson = 4 / peopleCount;
                explanationText.innerHTML = `
                    &lt;div class=&quot;math-formula&quot;&gt;7 - 3 = 4 (瓶)&lt;/div&gt;&lt;br&gt;
                    如果家里有 &lt;span class=&quot;text-accent font-bold&quot;&gt;${peopleCount}&lt;/span&gt; 口人：&lt;br&gt;
                    &lt;div class=&quot;math-formula&quot;&gt;4 &divide; ${peopleCount} = ${perPerson} (瓶)&lt;/div&gt;&lt;br&gt;
                    每人平均分到 &lt;span class=&quot;text-accent font-bold&quot;&gt;${perPerson}&lt;/span&gt; 瓶水，符合题意！
                `;
            }
        });

        // 4. 分水动画
        for (let i = 0; i &lt; 4; i++) {
            const targetMemberIndex = i % peopleCount;
            const targetMember = familyContainer.children[targetMemberIndex];
            const bottle = document.getElementById('bottle-' + i);
            
            tl.add({
                targets: bottle,
                translateX: targetMember.offsetLeft - bottle.offsetLeft + 10,
                translateY: targetMember.offsetTop - bottle.offsetTop - 40,
                scale: 0.5,
                opacity: 0,
                duration: 800
            }, '-=600');
        }
    }

    // 时钟逻辑
    let clockCtx;
    function initClock() {
        const canvas = document.getElementById('clock');
        clockCtx = canvas.getContext('2d');
        drawClock(4, 40);
    }

    function drawClock(hour, minute) {
        const ctx = clockCtx;
        const radius = 150;
        ctx.clearRect(0, 0, 300, 300);
        ctx.save();
        ctx.translate(radius, radius);
        
        // 表盘
        ctx.beginPath();
        ctx.arc(0, 0, radius - 10, 0, 2 * Math.PI);
        ctx.strokeStyle = '#0A4737';
        ctx.lineWidth = 5;
        ctx.stroke();

        // 刻度
        for (let i = 0; i &lt; 12; i++) {
            ctx.save();
            ctx.rotate(i * Math.PI / 6);
            ctx.beginPath();
            ctx.moveTo(0, -radius + 20);
            ctx.lineTo(0, -radius + 35);
            ctx.stroke();
            ctx.restore();
        }

        // 时针
        ctx.save();
        const hourAngle = (hour % 12) * Math.PI / 6 + (minute / 60) * Math.PI / 6;
        ctx.rotate(hourAngle);
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(0, -radius + 70);
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();

        // 分针
        ctx.save();
        const minuteAngle = minute * Math.PI / 30;
        ctx.rotate(minuteAngle);
        ctx.beginPath();
        ctx.moveTo(0, 15);
        ctx.lineTo(0, -radius + 40);
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#FF6421';
        ctx.stroke();
        ctx.restore();

        ctx.restore();
    }

    function advanceTime() {
        anime({
            targets: { m: 40 },
            m: 60,
            duration: 2000,
            easing: 'easeInOutQuad',
            update: function(anim) {
                const currentM = anim.animatables[0].target.m;
                const currentH = 4 + (currentM - 40) / 60;
                drawClock(currentH, currentM % 60);
            },
            complete: () =&gt; {
                anime({
                    targets: '#result3',
                    opacity: 1,
                    translateY: [10, 0]
                });
            }
        });
    }

    // 倍数逻辑
    function showMultiples() {
        anime({
            targets: '#total-bar',
            opacity: 1,
            translateY: [20, 0],
            duration: 800
        });
        anime({
            targets: '#result4',
            opacity: 1,
            delay: 1000
        });
    }

    // 初始播放第一页语音
    window.onload = () =&gt; {
        setTimeout(() =&gt; {
            document.getElementById('audio1').play();
        }, 1000);
    };
&lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

            padding: 0 5px;
          ">×</button>
        </div>
      </div>
      <div id="image-content" style="
        text-align: center;
        overflow: hidden;
      ">
        <img id="viewer-image" src="assets/习题2.jpg" alt="教材分析图" style="
          width: 260px;
          border-radius: 8px;
          cursor: pointer;
          transition: width 0.15s ease;
        " onclick="openFullImage( + image_path + )" onwheel="handleWheel(event)">
      </div>
    </div>

    <!-- 全屏图片模态框 -->
    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    ">
      <img id="full-image" src="" style="
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;
      " onwheel="handleFullWheel(event)" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
      <button onclick="closeFullImage()" style="
        position: absolute;
        top: 20px;
        right: 20px;
        background: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 24px;
        cursor: pointer;
        z-index: 10;
      ">×</button>
      <div style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.9);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
</body>

</html>
