<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 趣味烙饼小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', '楷体', sans-serif;
            background-color: #fdf6e3;
            background-image: 
                linear-gradient(45deg, #ffdfba 25%, transparent 25%, transparent 75%, #ffdfba 75%, #ffdfba), 
                linear-gradient(45deg, #ffdfba 25%, transparent 25%, transparent 75%, #ffdfba 75%, #ffdfba);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background-color: #ff9f43;
            color: white;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
            z-index: 100;
            border-bottom: 4px solid #ee5253;
        }
        
        h1 {
            font-size: 32px;
            text-shadow: 2px 2px 0px #ee5253;
            letter-spacing: 2px;
        }
        
        .main-content {
            display: flex;
            flex: 1;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        
        .container {
            flex: 1;
            position: relative;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px dashed #ffb142;
            overflow: hidden;
        }
        
        .timer-panel {
            width: 25%;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #34ace0;
        }
        
        .timer-title {
            font-size: 24px;
            color: #34ace0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .timer-display {
            font-size: 56px;
            font-weight: bold;
            color: #ff5252;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 0px #f8a5c2;
        }
        
        .timer-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 200px;
        }
        
        .timer-btn {
            padding: 12px 20px;
            background-color: #34ace0;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #227093;
        }
        
        .timer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #227093;
        }
        
        .timer-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #227093;
        }

        .timer-btn.add-time {
            background-color: #33d9b2;
            box-shadow: 0 4px 0 #218c74;
        }
        
        .timer-btn.add-time:hover {
            box-shadow: 0 6px 0 #218c74;
        }

        .timer-btn.add-time:active {
            box-shadow: 0 0 0 #218c74;
        }
        
        #big-circle {
            position: absolute;
            width: 7cm; 
            height: 7cm;
            background-color: #2f3640;
            border: 8px solid #718093;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.3);
        }
        
        /* 修复后的平底锅手柄 */
        #big-circle::after {
            content: '';
            position: absolute;
            width: 140px; /* 横向长度 */
            height: 40px; /* 竖向高度 */
            background-color: #e1b12c;
            border-radius: 20px;
            top: 50%;
            right: -130px; /* 向外伸出，并与锅体连接 */
            transform: translateY(-50%);
            /* 调整阴影方向以适应横向手柄 */
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.3);
            z-index: -1; /* 藏在锅的图层下方，让连接处看起来无缝贴合 */
        }

        .small-circle {
            position: absolute;
            width: 3cm; 
            height: 3cm;
            background-color: #fef0ca;
            border: 3px solid #e1b12c;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d35400;
            font-weight: bold;
            user-select: none;
            transition: transform 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.8);
            z-index: 10;
        }

        .circle-title {
            font-size: 14px;
            color: rgba(211, 84, 0, 0.6);
            margin-bottom: 2px;
        }

        .circle-side {
            font-size: 28px;
        }
        
        .small-circle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.8);
        }
        
        .small-circle.yellow {
            background-color: #ffb142 !important;
            border-color: #d1ccc0 !important;
            color: #fff !important;
            text-shadow: 1px 1px 2px #d35400;
            box-shadow: 0 0 20px rgba(255, 177, 66, 0.8), inset 0 0 15px rgba(211, 84, 0, 0.3);
        }

        .small-circle.yellow .circle-title {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .controls {
            background-color: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        button.action-btn {
            padding: 12px 30px;
            background-color: #ff793f;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #cd6133;
        }
        
        button.action-btn:hover {
            background-color: #ff9f43;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #cd6133;
        }

        button.action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cd6133;
        }

        button.help-btn {
            background-color: #706fd3;
            box-shadow: 0 4px 0 #474787;
        }

        button.help-btn:hover {
            background-color: #8382c7;
            box-shadow: 0 6px 0 #474787;
        }

        button.help-btn:active {
            box-shadow: 0 0 0 #474787;
        }
        
        .status {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            color: #d35400;
            box-shadow: 0 4px 15px rgba(211, 84, 0, 0.2);
            z-index: 100;
            border: 2px solid #ffda79;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <header>
        <h1>🍳 趣味烙饼小游戏</h1>
    </header>
    
    <div class="main-content">
        <div class="container">
            <div id="big-circle"></div>
            <div class="status" id="status">👆 拖入平底锅后，需点击【增加时间】才会烤熟哦！</div>
        </div>
        
        <div class="timer-panel">
            <div class="timer-title">⏰ 用时记录</div>
            <div class="timer-display" id="timerDisplay">0分钟</div>
            <div class="timer-controls">
                <button class="timer-btn add-time" id="addTimeBtn">➕ 增加 3 分钟</button>
                <button class="timer-btn" id="resetTimerBtn">🔄 时间归零</button>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button id="resetBtn" class="action-btn">🍽️ 重新开始</button>
        <button id="helpBtn" class="action-btn help-btn">📖 怎么玩？</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            const bigCircle = document.getElementById('big-circle');
            const resetBtn = document.getElementById('resetBtn');
            const helpBtn = document.getElementById('helpBtn');
            const status = document.getElementById('status');
            const timerDisplay = document.getElementById('timerDisplay');
            const addTimeBtn = document.getElementById('addTimeBtn');
            const resetTimerBtn = document.getElementById('resetTimerBtn');
            
            let totalMinutes = 0;
            
            function updateTimerDisplay() {
                timerDisplay.textContent = `${totalMinutes}分钟`;
            }
            
            // 点击增加时间的逻辑
            addTimeBtn.addEventListener('click', function() {
                totalMinutes += 3;
                updateTimerDisplay();
                
                let cookedInfo = [];
                
                // 检查第 1, 2, 3 对饼
                [1, 2, 3].forEach(pairId => {
                    const pairCircles = smallCircles.filter(c => parseInt(c.dataset.pairId) === pairId);
                    // 找到朝下的那一面（底层）
                    const bottomCircle = pairCircles.find(c => c.dataset.isTop !== 'true');
                    
                    // 如果底层饼在锅里，并且还没变黄
                    if (bottomCircle && isCircleInsideBigCircle(bottomCircle) && !bottomCircle.classList.contains('yellow')) {
                        bottomCircle.classList.add('yellow');
                        // 记录烤熟的是哪个饼的哪一面
                        cookedInfo.push(`第${pairId}个饼的【${bottomCircle.dataset.side}面】`);
                    }
                });

                // 更新提示状态
                if (cookedInfo.length > 0) {
                    status.textContent = `😋 ${cookedInfo.join(' 和 ')} 烤成了金黄色！`;
                } else {
                    status.textContent = `⏱️ 时间过去了 3 分钟...`;
                }
            });
            
            resetTimerBtn.addEventListener('click', function() {
                totalMinutes = 0;
                updateTimerDisplay();
            });
            
            const containerRect = container.getBoundingClientRect();
            const bigCircleRect = bigCircle.getBoundingClientRect();
            const bigCircleCenterX = bigCircleRect.left - containerRect.left + bigCircleRect.width / 2;
            const bigCircleCenterY = bigCircleRect.top - containerRect.top + bigCircleRect.height / 2;
            const bigCircleRadius = bigCircleRect.width / 2;
            
            // 增加了 side 属性来区分正反面
            const pairs = [
                { id: 1, x: 60, y: 50, zIndex: 10, side: '正' },
                { id: 1, x: 60, y: 50, zIndex: 9, side: '反' },
                { id: 2, x: 60, y: 190, zIndex: 10, side: '正' },
                { id: 2, x: 60, y: 190, zIndex: 9, side: '反' },
                { id: 3, x: 60, y: 330, zIndex: 10, side: '正' },
                { id: 3, x: 60, y: 330, zIndex: 9, side: '反' }
            ];
            
            const smallCircles = [];
            
            pairs.forEach((pair, index) => {
                const smallCircle = document.createElement('div');
                smallCircle.className = 'small-circle';
                smallCircle.style.left = pair.x + 'px';
                smallCircle.style.top = pair.y + 'px';
                smallCircle.style.zIndex = pair.zIndex;
                
                // 渲染带正反面的文字内容
                smallCircle.innerHTML = `
                    <span class="circle-title">饼 ${pair.id}</span>
                    <span class="circle-side">${pair.side}</span>
                `;
                
                smallCircle.dataset.pairId = pair.id;
                smallCircle.dataset.index = index;
                smallCircle.dataset.side = pair.side; // 记录正反面
                smallCircle.dataset.isTop = (pair.zIndex === 10); 
                
                container.appendChild(smallCircle);
                smallCircles.push(smallCircle);
                
                let clickTimer = null;
                smallCircle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        toggleZIndex(parseInt(this.dataset.pairId));
                    } else {
                        clickTimer = setTimeout(() => {
                            clickTimer = null;
                        }, 300);
                    }
                });
                
                makeDraggable(smallCircle);
            });
            
            function toggleZIndex(pairId) {
                const pairCircles = smallCircles.filter(circle => 
                    parseInt(circle.dataset.pairId) === pairId
                );
                
                pairCircles.forEach(circle => {
                    const currentZIndex = parseInt(circle.style.zIndex);
                    circle.style.zIndex = currentZIndex === 10 ? 9 : 10;
                    circle.dataset.isTop = (circle.style.zIndex === '10');
                });
                
                // 翻面后检查：如果在锅里且底面没熟，提示需要加时间
                const bottomCircle = pairCircles.find(c => c.dataset.isTop !== 'true');
                if (bottomCircle && isCircleInsideBigCircle(bottomCircle) && !bottomCircle.classList.contains('yellow')) {
                    status.textContent = `🍳 第 ${pairId} 个饼【${bottomCircle.dataset.side}面】朝下了，请点击【➕ 增加 3 分钟】！`;
                } else {
                    const topCircle = pairCircles.find(c => c.dataset.isTop === 'true');
                    status.textContent = `✨ 第 ${pairId} 个饼已经翻面，现在是【${topCircle.dataset.side}面】朝上啦！`;
                }
            }
            
            function isCircleInsideBigCircle(smallCircle) {
                const smallCircleRect = smallCircle.getBoundingClientRect();
                const smallCircleCenterX = smallCircleRect.left - containerRect.left + smallCircleRect.width / 2;
                const smallCircleCenterY = smallCircleRect.top - containerRect.top + smallCircleRect.height / 2;
                const distance = Math.sqrt(
                    Math.pow(smallCircleCenterX - bigCircleCenterX, 2) + 
                    Math.pow(smallCircleCenterY - bigCircleCenterY, 2)
                );
                const smallCircleRadius = smallCircleRect.width / 2;
                const tolerance = 5;
                return (distance + smallCircleRadius) <= (bigCircleRadius + tolerance);
            }
            
            function makeDraggable(element) {
                let isDragging = false;
                let offsetX, offsetY;
                let originalZIndex = element.style.zIndex;
                let originalIsTop = element.dataset.isTop;
                
                element.addEventListener('mousedown', startDrag);
                
                function startDrag(e) {
                    isDragging = true;
                    originalZIndex = element.style.zIndex;
                    originalIsTop = element.dataset.isTop;
                    const rect = element.getBoundingClientRect();
                    offsetX = e.clientX - rect.left;
                    offsetY = e.clientY - rect.top;
                    element.style.zIndex = 100;
                    
                    document.addEventListener('mousemove', drag);
                    document.addEventListener('mouseup', stopDrag);
                    e.preventDefault();
                }
                
                function drag(e) {
                    if (!isDragging) return;
                    let newX = e.clientX - containerRect.left - offsetX;
                    let newY = e.clientY - containerRect.top - offsetY;
                    
                    newX = Math.max(0, Math.min(newX, containerRect.width - element.offsetWidth));
                    newY = Math.max(0, Math.min(newY, containerRect.height - element.offsetHeight));
                    
                    element.style.left = newX + 'px';
                    element.style.top = newY + 'px';
                    
                    const pairId = parseInt(element.dataset.pairId);
                    const pairCircles = smallCircles.filter(circle => 
                        parseInt(circle.dataset.pairId) === pairId && circle !== element
                    );
                    
                    pairCircles.forEach(circle => {
                        circle.style.left = newX + 'px';
                        circle.style.top = newY + 'px';
                    });
                }
                
                function stopDrag() {
                    isDragging = false;
                    document.removeEventListener('mousemove', drag);
                    document.removeEventListener('mouseup', stopDrag);
                    
                    element.style.zIndex = originalZIndex;
                    element.dataset.isTop = originalIsTop;
                    
                    const pairId = parseInt(element.dataset.pairId);
                    
                    // 判断拖拽结束后是否放进了锅里
                    if (isCircleInsideBigCircle(element)) {
                        const pairCircles = smallCircles.filter(c => parseInt(c.dataset.pairId) === pairId);
                        const bottomCircle = pairCircles.find(c => c.dataset.isTop !== 'true');
                        // 如果底层还没熟，提示需要加时间
                        if (bottomCircle && !bottomCircle.classList.contains('yellow')) {
                            status.textContent = `🍳 第 ${pairId} 个饼的【${bottomCircle.dataset.side}面】已贴着锅底，请点击【➕ 增加 3 分钟】！`;
                        }
                    } else {
                        status.textContent = '👆 拖入平底锅后，需点击【增加时间】才会烤熟哦！';
                    }
                }
            }
            
            resetBtn.addEventListener('click', function() {
                pairs.forEach((pair, index) => {
                    smallCircles[index].style.left = pair.x + 'px';
                    smallCircles[index].style.top = pair.y + 'px';
                    smallCircles[index].style.zIndex = pair.zIndex;
                    smallCircles[index].classList.remove('yellow');
                    smallCircles[index].dataset.isTop = (pair.zIndex === 10);
                });
                
                totalMinutes = 0;
                updateTimerDisplay();
                
                status.textContent = '🧹 厨房已经打扫干净，可以重新开始烙饼啦！';
                setTimeout(() => {
                    status.textContent = '👆 拖入平底锅后，需点击【增加时间】才会烤熟哦！';
                }, 2000);
            });
            
            helpBtn.addEventListener('click', function() {
                alert("👨‍🍳 小厨师操作指南：\n\n1. 【下锅】把生面团(烙饼)拖进黑色的平底锅里。\n2. 【加热】点击右侧的【➕ 增加 3 分钟】，贴着锅底的那一面就会被烤成熟透的金黄色！\n3. 【翻面】鼠标连续点两下(双击)烙饼可以把它翻面，翻面后需要再次增加时间才能烤熟另一面哦。\n4. 【观察】每张饼都有正反两面，烤熟的面会变成金黄色！\n5. 【挑战】一次锅里最多可以放两张饼，试试看怎样用最少的时间把3张饼的正反两面都烤熟吧！");
            });
            
            window.addEventListener('resize', function() {
                const newContainerRect = container.getBoundingClientRect();
                containerRect.width = newContainerRect.width;
                containerRect.height = newContainerRect.height;
            });
        });
    </script>
</body>
</html>
