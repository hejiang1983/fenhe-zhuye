                &lt;div class=&quot;glass-card px-4 py-2 rounded-full text-sm text-gray-600 shadow-sm&quot;&gt;🔍 滚轮缩放&lt;/div&gt;

    &lt;script&gt;
        let currentValue = 0;
        let targetValue = 0;
        let rotationX = -0.3;
        let rotationY = 0.5;
        let zoom = 1;
        let isMobile = false;

        function setup() {
            // 检测是否为移动端
            isMobile = window.innerWidth &lt;= 768;
            
            // 根据设备类型计算canvas尺寸
            let canvasWidth, canvasHeight;
            if (isMobile) {
                canvasWidth = windowWidth;
                canvasHeight = windowHeight * 0.55;
            } else {
                canvasWidth = windowWidth - 320;
                canvasHeight = windowHeight;
            }
            
            const canvas = createCanvas(canvasWidth, canvasHeight, WEBGL);
            canvas.parent('p5-canvas');
            smooth();
            
            // 移动端触摸支持
            canvas.touchStarted(handleTouchStart);
            canvas.touchMoved(handleTouchMove);
            canvas.touchEnded(handleTouchEnd);
        }
        
        let touchStartX, touchStartY;
        let isTouching = false;
        
        function handleTouchStart(e) {
            if (e.touches.length === 1) {
                isTouching = true;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
            return false;
        }
        
        function handleTouchMove(e) {
            if (isTouching &amp;&amp; e.touches.length === 1) {
                const touchX = e.touches[0].clientX;
                const touchY = e.touches[0].clientY;
                rotationY += (touchX - touchStartX) * 0.01;
                rotationX += (touchY - touchStartY) * 0.01;
                touchStartX = touchX;
                touchStartY = touchY;
            }
            return false;
        }
        
        function handleTouchEnd() {
            isTouching = false;
            return false;
        }

        function draw() {
            background(244, 243, 236);
            
            // 交互控制 (桌面端鼠标)
            if (mouseIsPressed &amp;&amp; mouseX &gt; 0 &amp;&amp; !isMobile) {
                rotationY += (mouseX - pmouseX) * 0.01;
                rotationX += (mouseY - pmouseY) * 0.01;
            }
            
            rotateX(rotationX);
            rotateY(rotationY);
            scale(zoom);

            // 光照
            ambientLight(150);
            directionalLight(255, 255, 255, 0.5, 0.5, -1);
            pointLight(255, 255, 255, 200, -200, 200);

            // 平滑数值变化
            if (currentValue &lt; targetValue) {
                currentValue = Math.min(currentValue + Math.ceil((targetValue - currentValue) * 0.1), targetValue);
                document.getElementById('display-value').innerText = currentValue;
            } else if (currentValue &gt; targetValue) {
                currentValue = Math.max(currentValue - Math.ceil((currentValue - targetValue) * 0.1), targetValue);
                document.getElementById('display-value').innerText = currentValue;
            }

            drawBlocks(currentValue);
        }

        function drawBlocks(val) {
            let thousands = Math.floor(val / 1000);
            let hundreds = Math.floor((val % 1000) / 100);
            let tens = Math.floor((val % 100) / 10);
            let ones = val % 10;

            const spacing = 120;
            const cubeSize = 8;

            // 绘制千 (立方体)
            push();
            translate(-spacing * 1.5, 0, 0);
            fill(255, 86, 0, 200);
            stroke(200, 50, 0);
            for (let i = 0; i &lt; thousands; i++) {
                push();
                translate(0, 0, i * (cubeSize * 10 + 15)); // 按薄边方向排列，有间隔
                rotateX(HALF_PI); // 立起来
                // 绘制一个由 10x10x10 组成的大立方体
                box(cubeSize * 10);
                pop();
            }
            pop();

            // 绘制百 (立体)
            push();
            translate(-spacing * 0.5, 0, 0);
            fill(255, 120, 50, 180);
            stroke(200, 80, 0);
            for (let i = 0; i &lt; hundreds; i++) {
                push();
                translate(0, 0, i * (cubeSize + 15)); // 按薄边方向排列，有间隔
                rotateX(HALF_PI); // 立起来
                // 绘制一个由 10x10x1 组成的板状
                box(cubeSize * 10, cubeSize, cubeSize * 10);
                pop();
            }
            pop();

            // 绘制十 (条)
            push();
            translate(spacing * 0.5, 0, 0);
            fill(255, 160, 100, 160);
            stroke(200, 100, 0);
            for (let i = 0; i &lt; tens; i++) {
                push();
                translate(0, 0, i * (cubeSize + 15)); // 按薄边方向排列，有间隔
                // 木棍竖起来（垂直站立）
                box(cubeSize, cubeSize * 10, cubeSize);
                pop();
            }
            pop();

            // 绘制个 (小方块)
            push();
            translate(spacing * 1.5, 30, 0);
            fill(255, 200, 150, 140);
            stroke(200, 120, 0);
            for (let i = 0; i &lt; ones; i++) {
                push();
                translate(0, -i * (cubeSize + 2), 0); // 竖直方向排列，紧凑间隔
                // 绘制小方块
                box(cubeSize);
                pop();
            }
            pop();
        }

        function addValue(v) {
            if (targetValue + v &lt;= 9999) {
                targetValue += v;
                
                // 按钮点击动画
                anime({
                    targets: '#display-value',
                    scale: [1, 1.2, 1],
                    duration: 300,
                    easing: 'easeOutQuad'
                });
            } else {
                alert(&quot;本演示最高支持到 9999 哦！&quot;);
            }
        }

        function resetValue() {
            targetValue = 0;
        }

        function mouseWheel(event) {
            zoom -= event.delta * 0.001;
            zoom = constrain(zoom, 0.5, 3);
            return false;
        }

        function windowResized() {
            // 重新检测设备类型
            isMobile = window.innerWidth &lt;= 768;
            
            // 根据设备类型计算新的canvas尺寸
            let canvasWidth, canvasHeight;
            if (isMobile) {
                canvasWidth = windowWidth;
                canvasHeight = windowHeight * 0.55;
            } else {
                canvasWidth = windowWidth - 320;
                canvasHeight = windowHeight;
            }
            
            resizeCanvas(canvasWidth, canvasHeight);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    //      * 点击 HTML 任何部分的埋点
    //      */
    //     function trackHtmlClick(event) {
    //       // 避免重复上报（如果点击的是 logo 或按钮，会有专门的埋点）

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>

          <button onclick="resetImageZoom()" style="

    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);

        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;

        position: absolute;
        top: 20px;

        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
