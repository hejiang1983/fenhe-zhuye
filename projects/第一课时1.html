    &lt;title&gt;人教版二年级数学知识梳理动画&lt;/title&gt;
    &lt;!-- Tailwind CSS --&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zgLDUdmazTYc0B4K6Cor.js&quot;&gt;&lt;/script&gt;

    &lt;style&gt;
        :root {
            --primary: #A7DBA8;
            --primary-dark: #0A4737;
            --bg-light: #D3E09E;
            --card-bg: #D8FBF7;
            --accent-orange: #FF6421;
            --accent-blue: #A1CAF9;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'MiSans', 'PingFang SC', sans-serif;
            overflow-x: hidden;
            color: #0D2622;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .header p {
            font-size: 1.2rem;
            color: #60A0A0;
        }

        .mindmap-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* 流程图连线样式 */
        .flow-line {
            position: absolute;
            background: #cbd5e1;
            z-index: 0;
        }

        .modules-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 3rem;
            position: relative;
        }

        .module-row {
            display: flex;
            justify-content: center;
            gap: 4rem;
            width: 100%;
            position: relative;
        }

        .module-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid #f1f5f9;
            cursor: default;
            position: relative;
            z-index: 10;
        }

        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .module-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            text-align: center;
            background: var(--card-bg);
            padding: 0.6rem;
            border-radius: 10px;
        }

        .sub-points {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .point-item {
            background: #f8fafc;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            text-align: center;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .point-item:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .demo-modal {
            background: white;
            width: 90%;
            max-width: 800px;
            height: 85vh;
            border-radius: 32px;
            position: relative;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .demo-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .demo-visual {
            width: 100%;
            height: 420px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #f8fafc;
            border-radius: 20px;
            border: 2px dashed #cbd5e1;
            overflow: hidden;
        }

        .game-option {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 1rem 2rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .game-option:hover {
            border-color: var(--primary);
            background: var(--card-bg);
            transform: translateY(-3px);
        }

        .game-option.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }

        .game-option.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .game-feedback {
            position: absolute;
            font-size: 3rem;
            pointer-events: none;
            z-index: 50;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .success-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-dark);
            display: none;
            z-index: 100;
            border: 3px solid var(--primary);
        }

        .knowledge-footer {
            margin-top: auto;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #475569;
            border-left: 4px solid var(--primary);
            width: 100%;
            text-align: left;
        }

        .guide-tip {
            position: fixed;
            bottom: 2rem;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .modules-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .module-card {
                width: 90%;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    &lt;/style&gt;

            document.getElementById('knowledgeFooter').innerHTML = data.note;
            document.getElementById('successMsg').style.display = 'none';
            renderQuestion();
            document.getElementById('overlay').style.display = 'flex';
            anime({ targets: '#modal', scale: [0.8, 1], opacity: [0, 1], duration: 500, easing: 'easeOutBack' });
        }

        function renderQuestion() {
            const data = knowledgeData[currentPoint];
            const question = data.questions[currentQuestionIndex];
            const visualContainer = document.getElementById('demoVisual');
            const progress = (currentQuestionIndex / 10) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('questionCounter').innerText = `第 ${currentQuestionIndex + 1}/10 题`;
            visualContainer.innerHTML = `
                &lt;div class=&quot;flex flex-col items-center w-full p-4&quot;&gt;
                    &lt;!-- 顶部知识点详解 --&gt;
                    &lt;div class=&quot;w-full bg-blue-50 p-3 rounded-xl mb-6 text-sm text-blue-800 border border-blue-100 text-left&quot;&gt;

                    &lt;div class=&quot;text-xl font-bold mb-8 text-primary-dark text-center&quot;&gt;${question.q}&lt;/div&gt;
                    &lt;div class=&quot;flex flex-wrap justify-center gap-4&quot;&gt;
                        ${question.options.map(opt =&gt; {
                            const safeOpt = opt.replace(/'/g, &quot;\\'&quot;);
                            const safeAns = question.a.replace(/'/g, &quot;\\'&quot;);
                            return `&lt;div class=&quot;game-option&quot; onclick=&quot;checkAnswer(this, '${safeOpt}', '${safeAns}')&quot;&gt;${opt}&lt;/div&gt;`;

            `;

                correctCount++;

                el.classList.add('wrong');
                showFeedback('❌', el);
                anime({ targets: el, translateX: [-10, 10, -5, 5, 0], duration: 400 });
            }

            // 无论对错，0.8秒后进入下一题
            setTimeout(() =&gt; {
                if (currentQuestionIndex &lt; 9) {
                    currentQuestionIndex++;
                    renderQuestion();
                } else {
                    document.getElementById('progressBar').style.width = '100%';
                    showSuccess();
                }
            }, 800);
        }

        function showFeedback(symbol, el) {
            const rect = el.getBoundingClientRect();
            const feedback = document.createElement('div');
            feedback.className = 'game-feedback';
            feedback.innerText = symbol;
            feedback.style.left = (rect.left + rect.width/2 - 20) + 'px';
            feedback.style.top = (rect.top - 50) + 'px';
            document.body.appendChild(feedback);
            anime({ targets: feedback, translateY: -50, opacity: [1, 0], duration: 1000, easing: 'easeOutExpo', complete: () =&gt; feedback.remove() });
        }

        function showSuccess() {
            const msg = document.getElementById('successMsg');
            const score = correctCount * 10;
            msg.innerHTML = `🌟 挑战结束！你的得分：${score} 分 🌟&lt;br&gt;&lt;span class=&quot;text-lg font-normal&quot;&gt;答对 ${correctCount} 题 / 共 10 题&lt;/span&gt;`;
            msg.style.display = 'block';
            anime({ targets: msg, scale: [0, 1], opacity: [0, 1], duration: 800, easing: 'easeOutElastic(1, .6)' });
            
            if (score === 100) {
                for(let i=0; i&lt;30; i++) { createConfetti(); }
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'absolute';
            confetti.style.width = '10px';
            confetti.style.height = '10px';
            confetti.style.backgroundColor = ['#FF6421', '#A1CAF9', '#A7DBA8', '#FFD700'][Math.floor(Math.random()*4)];
            confetti.style.left = '50%';
            confetti.style.top = '50%';
            confetti.style.borderRadius = '50%';
            document.getElementById('demoVisual').appendChild(confetti);
            anime({ targets: confetti, translateX: () =&gt; anime.random(-300, 300), translateY: () =&gt; anime.random(-300, 300), scale: [0, 1, 0], opacity: [1, 0], duration: 2000, easing: 'easeOutExpo', complete: () =&gt; confetti.remove() });
        }

        function closeDemo() {
            anime({ targets: '#modal', scale: [1, 0.8], opacity: [1, 0], duration: 300, easing: 'easeInBack', complete: function() { document.getElementById('overlay').style.display = 'none'; } });
        }

        function drawFlowLines() {
            const container = document.getElementById('flowLines');
            container.innerHTML = '';
            const root = document.querySelector('.root-node');
            const m1 = document.getElementById('module1');
            const m2 = document.getElementById('module2');
            
            const rootRect = root.getBoundingClientRect();
            const m1Rect = m1.getBoundingClientRect();
            const m2Rect = m2.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const rootBottomX = rootRect.left + rootRect.width / 2 - containerRect.left;
            const rootBottomY = rootRect.bottom - containerRect.top;
            
            const m1TopX = m1Rect.left + m1Rect.width / 2 - containerRect.left;
            const m1TopY = m1Rect.top - containerRect.top;
            
            const m2TopX = m2Rect.left + m2Rect.width / 2 - containerRect.left;
            const m2TopY = m2Rect.top - containerRect.top;

            // 绘制主干线
            const midY = rootBottomY + (m1TopY - rootBottomY) / 2;
            
            // 垂直线下
            createLine(rootBottomX, rootBottomY, 2, midY - rootBottomY);
            // 水平横线
            createLine(m1TopX, midY, m2TopX - m1TopX, 2);
            // 垂直线到M1
            createLine(m1TopX, midY, 2, m1TopY - midY);
            // 垂直线到M2
            createLine(m2TopX, midY, 2, m2TopY - midY);
        }

        function createLine(x, y, w, h) {
            const line = document.createElement('div');
            line.className = 'flow-line';
            line.style.left = x + 'px';
            line.style.top = y + 'px';
            line.style.width = w + 'px';
            line.style.height = h + 'px';
            document.getElementById('flowLines').appendChild(line);
        }

        window.onload = () =&gt; {
            drawFlowLines();
            window.addEventListener('resize', drawFlowLines);
            anime({ targets: '.root-node', translateY: [-50, 0], opacity: [0, 1], duration: 1000, easing: 'easeOutExpo' });
            anime({ targets: '.module-card', translateY: [50, 0], opacity: [0, 1], delay: anime.stagger(200, {start: 500}), duration: 1000, easing: 'easeOutExpo' });
        };
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    document.addEventListener('DOMContentLoaded', function () {

          // 按钮的 onclick 会处理跳转
        })
      }


    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>

    <!-- 图片播放容器 -->
    <div id="image-viewer" style="
      display: none;

    ">
      <div style="
        display: flex;
        align-items: center;

      ">

        <div style="display: flex; gap: 5px; align-items: center;">
          <span id="zoom-level" style="font-size: 12px; color: #667eea; margin-right: 8px; min-width: 45px;">100%</span>
          <button onclick="resetImageZoom()" style="
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #667eea;
            padding: 0 5px;
          ">重置</button>
          <button onclick="hideImageViewer()" style="
            background: none;

            cursor: pointer;

            color: #666;

          ">×</button>
        </div>
      </div>

        text-align: center;
        overflow: hidden;
      ">

          width: 260px;

          transition: width 0.15s ease;
        " onclick="openFullImage( + image_path + )" onwheel="handleWheel(event)">
      </div>

    <!-- 全屏图片模态框 -->
    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    ">
      <img id="full-image" src="" style="
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;
      " onwheel="handleFullWheel(event)" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
      <button onclick="closeFullImage()" style="
        position: absolute;
        top: 20px;
        right: 20px;
        background: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 24px;
        cursor: pointer;
        z-index: 10;
      ">×</button>
      <div style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.9);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
