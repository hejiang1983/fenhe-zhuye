<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 几何装载实验室 - 操作优化版</title>
    <style>
        body { margin: 0; background-color: #1a1a1b; color: #fff; font-family: "Microsoft YaHei", sans-serif; overflow: hidden; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        #counter {
            background: rgba(0, 242, 254, 0.1);
            border: 2px solid #00f2fe;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            color: #00f2fe;
            width: fit-content;
            pointer-events: auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            pointer-events: auto;
            margin-bottom: 20px;
        }

        button {
            background: #333336;
            border: 1px solid #555;
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            border-color: #00f2fe;
            color: #00f2fe;
        }

        #hint-box {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.8;
            border: 1px solid #444;
            pointer-events: auto;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="counter">已装入: <span id="count-val">0</span> 盒</div>
    
    <div id="hint-box">
        <b style="color:#deff9a">教学操作指南：</b><br>
        1. <span style="color:#00f2fe; font-weight:bold;">鼠标双击</span>：翻转茶叶盒姿态<br>
        2. <span style="color:#00f2fe; font-weight:bold;">按住鼠标左键</span>：拖动茶叶盒放入纸箱<br>
        3. <span style="color:#00f2fe; font-weight:bold;">按住鼠标右键</span>： 环绕观察画布
    </div>

    <div>
        <div class="controls">
            <button onclick="addBox()">生成茶盒</button>
            <button onclick="undoBox()">撤回</button>
            <button onclick="toggleDimensions()" id="btn-dim">显示尺寸</button>
            <button onclick="resetScene()">全部清空</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, orbit;
    let boxes = [];
    const containerSize = 30; 
    window.isDimVisible = false;
    let containerLabels = new THREE.Group();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let draggedBox = null;
    let originalPos = new THREE.Vector3();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 15); 

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1b);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(50, 40, 60);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 操作优化：将左键旋转改为右键旋转 (MOUSE.RIGHT)
        // ==========================================
        orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.mouseButtons = {
            LEFT: null,      // 禁用左键旋转，留给拖拽盒子
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE 
        };
        orbit.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(50, 50, 50);
        scene.add(light);

        // 外框
        const boxGeo = new THREE.BoxGeometry(containerSize, containerSize, containerSize);
        const edges = new THREE.EdgesGeometry(boxGeo); 
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        const wireframe = new THREE.LineSegments(edges, lineMat);
        scene.add(wireframe);

        const grid = new THREE.GridHelper(100, 20, 0x333333, 0x222222);
        grid.position.y = -15.1; 
        scene.add(grid);

        initContainerLabels();

        window.addEventListener('pointerdown', onPointerDown, false);
        window.addEventListener('pointermove', onPointerMove, false);
        window.addEventListener('pointerup', onPointerUp, false);
        window.addEventListener('dblclick', onDoubleClick, false);
        window.addEventListener('contextmenu', e => e.preventDefault(), false); // 禁用默认右键菜单
        window.addEventListener('resize', onWindowResize, false);
    }

    function createTextSprite(text) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(14, 14, 100, 36);
        ctx.font = 'Bold 24px Microsoft YaHei';
        ctx.fillStyle = '#deff9a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 32);
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
        sprite.scale.set(8, 4, 1);
        sprite.renderOrder = 999;
        return sprite;
    }

    function initContainerLabels() {
        containerLabels.visible = false;
        scene.add(containerLabels);
        const lblX = createTextSprite('30 cm'); lblX.position.set(0, -15, 15); containerLabels.add(lblX);
        const lblY = createTextSprite('30 cm'); lblY.position.set(15, 0, 15); containerLabels.add(lblY);
        const lblZ = createTextSprite('30 cm'); lblZ.position.set(15, -15, 0); containerLabels.add(lblZ);
    }

    function addBox() {
        const geometry = new THREE.BoxGeometry(20, 10, 20);
        const matCyan = new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
        const matBlue = new THREE.MeshPhongMaterial({ color: 0x0000ff, transparent: true, opacity: 0.8 });
        const matMagenta = new THREE.MeshPhongMaterial({ color: 0xff00ff, transparent: true, opacity: 0.8 });
        const materials = [matBlue, matBlue, matMagenta, matMagenta, matCyan, matCyan];
        
        const box = new THREE.Mesh(geometry, materials);
        box.userData = { mode: 0, colors: [0x0000ff, 0x0000ff, 0xff00ff, 0xff00ff, 0x00ffff, 0x00ffff], isValid: true };

        const boxLabels = new THREE.Group();
        boxLabels.visible = window.isDimVisible;
        const dX = createTextSprite('20 cm'); dX.position.set(0, -5, 10.5); boxLabels.add(dX);
        const dY = createTextSprite('10 cm'); dY.position.set(10.5, 0, 10.5); boxLabels.add(dY);
        const dZ = createTextSprite('20 cm'); dZ.position.set(10.5, -5, 0); boxLabels.add(dZ);
        box.add(boxLabels);
        box.userData.labelsGroup = boxLabels;

        box.position.set(35, -10, 0); 
        scene.add(box);
        boxes.push(box);
        updateUI();
    }

    function toggleDimensions() {
        window.isDimVisible = !window.isDimVisible;
        containerLabels.visible = window.isDimVisible;
        boxes.forEach(b => { if(b.userData.labelsGroup) b.userData.labelsGroup.visible = window.isDimVisible; });
        document.getElementById('btn-dim').innerText = window.isDimVisible ? "隐藏尺寸" : "显示尺寸";
    }

    function getCleanBox3(box) {
        const box3 = new THREE.Box3();
        if (!box.geometry.boundingBox) box.geometry.computeBoundingBox();
        box3.copy(box.geometry.boundingBox);
        box.updateMatrixWorld();
        box3.applyMatrix4(box.matrixWorld);
        return box3;
    }

    function onPointerDown(event) {
        if (event.button !== 0 || event.target.tagName === 'BUTTON') return; 
        updateMousePos(event);
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(boxes);
        if (intersects.length > 0) {
            draggedBox = intersects[0].object;
            originalPos.copy(draggedBox.position);
            // 拖拽时 orbit 自动失效(因为LEFT被设为null了)
        }
    }

    function onPointerMove(event) {
        if (!draggedBox) return;
        updateMousePos(event);
        raycaster.setFromCamera(mouse, camera);
        let intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane, intersectPoint);

        const snap = 5;
        draggedBox.position.x = Math.round(intersectPoint.x / snap) * snap;
        draggedBox.position.z = Math.round(intersectPoint.z / snap) * snap;

        const box3_temp = getCleanBox3(draggedBox);
        const boxHeight = box3_temp.max.y - box3_temp.min.y;
        
        let testY = -15 + (boxHeight / 2);
        draggedBox.position.y = testY;

        while (checkOverlap(draggedBox) && draggedBox.position.y <= 15) {
            draggedBox.position.y += 5;
            draggedBox.updateMatrixWorld();
        }

        if (isOutOfBounds(draggedBox) || checkOverlap(draggedBox)) {
            setBoxColor(draggedBox, 0xff4757);
            draggedBox.userData.isValid = false;
        } else {
            restoreBoxColor(draggedBox);
            draggedBox.userData.isValid = true;
        }
    }

    function onPointerUp() {
        if (!draggedBox) return;
        if (!draggedBox.userData.isValid) { 
            draggedBox.position.copy(originalPos); 
            restoreBoxColor(draggedBox); 
            draggedBox.userData.isValid = true;
        }
        draggedBox = null;
        updateUI(); 
    }

    function checkOverlap(box) {
        const box3 = getCleanBox3(box);
        box3.expandByScalar(-0.5); 
        for (let other of boxes) {
            if (other === box) continue;
            const other3 = getCleanBox3(other);
            other3.expandByScalar(-0.5);
            if (box3.intersectsBox(other3)) return true; 
        }
        return false;
    }

    function isOutOfBounds(box) {
        if (box.position.x > 18) return false;
        const box3 = getCleanBox3(box);
        box3.expandByScalar(-0.2); 
        if (box3.min.x < -15.1 || box3.max.x > 15.1) return true;
        if (box3.min.y < -15.1 || box3.max.y > 15.1) return true; 
        if (box3.min.z < -15.1 || box3.max.z > 15.1) return true;
        return false;
    }

    function onDoubleClick(event) {
        if (event.target.tagName === 'BUTTON') return;
        updateMousePos(event);
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(boxes);
        if (intersects.length > 0) {
            const box = intersects[0].object;
            box.userData.mode = (box.userData.mode + 1) % 3;
            if (box.userData.mode === 0) box.rotation.set(0, 0, 0);
            else if (box.userData.mode === 1) box.rotation.set(Math.PI / 2, 0, 0);
            else if (box.userData.mode === 2) box.rotation.set(0, 0, Math.PI / 2);
            box.updateMatrixWorld();
            const box3 = getCleanBox3(box);
            box.position.y = -15 + ((box3.max.y - box3.min.y) / 2);
            updateUI();
        }
    }

    function undoBox() { if (boxes.length > 0) { scene.remove(boxes.pop()); updateUI(); } }
    function setBoxColor(b, c) { b.material.forEach(m => m.color.setHex(c)); }
    function restoreBoxColor(b) { b.material.forEach((m, i) => m.color.setHex(b.userData.colors[i])); }
    function updateMousePos(e) { mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; }
    function updateUI() {
        let count = 0;
        boxes.forEach(b => { if (b.position.x <= 15 && b.userData.isValid) count++; });
        document.getElementById('count-val').innerText = count;
    }
    function resetScene() { boxes.forEach(b => scene.remove(b)); boxes = []; updateUI(); }
    function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    function animate() { requestAnimationFrame(animate); orbit.update(); renderer.render(scene, camera); }
</script>
</body>
</html>
