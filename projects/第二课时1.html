    &lt;style&gt;
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
        
        :root {
            --primary: #FF5600;
            --primary-light: #FF8941;
            --bg: #F4F3EC;
            --text: #0C0302;
            --text-secondary: #74706E;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .digit-box {
            width: 80px;
            height: 100px;
            border: 2px solid #E5E7EB;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            background: #F9FAFB;
            transition: all 0.3s ease;
        }

        .digit-box.active {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 15px rgba(255, 86, 0, 0.2);
        }

        .label-box {
            width: 80px;
            text-align: center;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 86, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 86, 0, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--text);
            border: 2px solid #E5E7EB;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #F9FAFB;
            border-color: var(--primary-light);
        }

        .speech-bubble {
            position: relative;
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 250px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 20px;
            border-width: 10px 10px 10px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        .input-field {
            border: 2px solid #E5E7EB;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
            font-size: 1.25rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .feedback-correct {
            color: #10B981;
            font-weight: 700;
        }

        .feedback-wrong {
            color: #EF4444;
            font-weight: 700;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .digit-box {
                width: 60px;
                height: 80px;
                font-size: 2rem;
            }
            .label-box {
                width: 60px;
                font-size: 0.875rem;
            }
        }
    &lt;/style&gt;

        &lt;audio id=&quot;audio-title&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/Vapcf9PDFqP9pPt8WfCjsD.mp3&quot;&gt;&lt;/audio&gt;
        &lt;audio id=&quot;audio-tip-write&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/oYtvjnxzUqeF6DZdbkFAVU.mp3&quot;&gt;&lt;/audio&gt;
        &lt;audio id=&quot;audio-tip-read&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/r3TvNytpChYEQZpmTG7v55.mp3&quot;&gt;&lt;/audio&gt;

    &lt;script type=&quot;module&quot;&gt;
        const demoNumbers = [
            { num: 4090, read: &quot;四千零九十&quot; },
            { num: 3745, read: &quot;三千七百四十五&quot; },
            { num: 2080, read: &quot;二千零八十&quot; },
            { num: 6009, read: &quot;六千零九&quot; },
            { num: 7001, read: &quot;七千零一&quot; },
            { num: 2700, read: &quot;二千七百&quot; }
        ];

        let currentDemoIndex = 0;
        let isDemoRunning = false;
        let currentPracticeNum = null;
        let practiceMode = 'write'; // 'write' (数字转读法) or 'read' (读法转数字)

        const avatarImg = document.getElementById('avatar');
        const instructionText = document.getElementById('instruction-text');
        const writeResult = document.getElementById('write-result');
        const readResult = document.getElementById('read-result');
        const practiceArea = document.getElementById('practice-area');
        const practiceQuestion = document.getElementById('practice-question');
        const practiceInput = document.getElementById('practice-input');
        const feedback = document.getElementById('feedback');

        const avatars = {
            boy: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/Thjepm5jf2CYb7FNeWFzmE.jpg&quot;,
            girl: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/fehNTQeBZ29aUe4mxHaFQE.jpg&quot;
        };

        // 工具函数：数字转中文读法
        function numberToChinese(num) {
            const units = ['', '十', '百', '千', '万'];
            const digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
            if (num === 0) return '零';
            
            let str = num.toString();
            let res = '';
            let zero = false;
            
            for (let i = 0; i &lt; str.length; i++) {
                let d = parseInt(str[i]);
                let unit = units[str.length - i - 1];
                
                if (d &gt; 0) {
                    if (zero) {
                        res += '零';
                        zero = false;
                    }
                    res += digits[d] + unit;
                } else {
                    zero = true;
                }
            }
            
            // 修正：如果末尾是0，不读
            if (res.endsWith('零')) res = res.slice(0, -1);
            
            return res;
        }

        // 动画：展示数字
        async function showNumber(num, read) {
            resetDisplay();
            const numStr = num.toString().padStart(5, ' ');
            const digits = numStr.split('');

            // 1. 数字飞入数位表
            for (let i = 0; i &lt; 5; i++) {
                const digit = digits[i].trim();
                if (digit !== '') {
                    const el = document.getElementById(`digit-${4-i}`);
                    el.textContent = digit;
                    el.classList.add('active');
                    
                    anime({
                        targets: el,
                        scale: [0.5, 1.1, 1],
                        opacity: [0, 1],
                        duration: 600,
                        easing: 'easeOutElastic(1, .8)'
                    });
                    await new Promise(r =&gt; { setTimeout(r, 300); });
                }
            }

            // 2. 显示写作
            writeResult.textContent = num;
            anime({
                targets: writeResult,
                translateY: [20, 0],
                opacity: [0, 1],
                duration: 800
            });

            // 3. 播放语音并显示读法
            const audio = document.getElementById(`audio-${num}`);
            if (audio) audio.play();

            let currentRead = '';
            for (let char of read) {
                currentRead += char;
                readResult.textContent = currentRead;
                await new Promise(r =&gt; { setTimeout(r, 150); });
            }
        }

        function resetDisplay() {
            for (let i = 0; i &lt; 5; i++) {
                const el = document.getElementById(`digit-${i}`);
                el.textContent = '';
                el.classList.remove('active');
            }
            writeResult.textContent = '';
            readResult.textContent = '';
            feedback.textContent = '';
            feedback.className = 'text-center text-sm min-h-[1.25rem]';
        }

        // 演示模式
        async function startDemo() {
            if (isDemoRunning) return;
            isDemoRunning = true;
            avatarImg.src = avatars.boy;
            instructionText.textContent = &quot;看好了，我来演示一下这些数字是怎么读写的！&quot;;
            
            for (let i = 0; i &lt; demoNumbers.length; i++) {
                if (!isDemoRunning) break;
                await showNumber(demoNumbers[i].num, demoNumbers[i].read);
                await new Promise(r =&gt; { setTimeout(r, 2000); });
            }
            
            isDemoRunning = false;
            instructionText.textContent = &quot;演示结束啦，你要不要试着练习一下？&quot;;
        }

        // 练习模式
        function startPractice() {
            isDemoRunning = false;
            resetDisplay();
            practiceArea.classList.remove('hidden');
            avatarImg.src = avatars.girl;
            
            // 随机生成一个 100-9999 的数
            currentPracticeNum = Math.floor(Math.random() * 9900) + 100;
            const read = numberToChinese(currentPracticeNum);
            
            // 随机选择练习类型
            practiceMode = Math.random() &gt; 0.5 ? 'write' : 'read';
            
            if (practiceMode === 'write') {
                practiceQuestion.textContent = `数字 ${currentPracticeNum} 应该怎么读？`;
                instructionText.textContent = &quot;请在练习区输入这个数字的读法吧！&quot;;
                document.getElementById('audio-tip-read').play();
            } else {
                practiceQuestion.textContent = `读作&ldquo;${read}&rdquo;的数字是多少？`;
                instructionText.textContent = &quot;请在练习区写出这个数字！&quot;;
                document.getElementById('audio-tip-write').play();
            }
            
            practiceInput.value = '';
            practiceInput.focus();
        }

        // 检查答案
        function checkAnswer() {
            const input = practiceInput.value.trim();
            const correctAnswer = practiceMode === 'write' ? numberToChinese(currentPracticeNum) : currentPracticeNum.toString();
            
            if (input === correctAnswer) {
                feedback.textContent = &quot;太棒了！完全正确！✨&quot;;
                feedback.className = &quot;text-center text-sm min-h-[1.25rem] feedback-correct&quot;;
                showNumber(currentPracticeNum, numberToChinese(currentPracticeNum));
                avatarImg.src = avatars.boy;
                instructionText.textContent = &quot;你真聪明！再来一个练习吧？&quot;;
                
                anime({
                    targets: '#feedback',
                    scale: [1, 1.2, 1],
                    duration: 500
                });
            } else {
                feedback.textContent = &quot;哎呀，再仔细想想看？加油！&quot;;
                feedback.className = &quot;text-center text-sm min-h-[1.25rem] feedback-wrong&quot;;
                avatarImg.src = avatars.girl;
                
                anime({
                    targets: '#practice-input',
                    translateX: [-10, 10, -10, 10, 0],
                    duration: 400,
                    easing: 'easeInOutSine'
                });
            }
        }

        // 事件监听
        document.getElementById('btn-demo').addEventListener('click', startDemo);
        document.getElementById('btn-practice').addEventListener('click', startPractice);
        document.getElementById('btn-reset').addEventListener('click', () =&gt; {
            isDemoRunning = false;
            resetDisplay();
            practiceArea.classList.add('hidden');
            avatarImg.src = avatars.boy;
            instructionText.textContent = &quot;认识了新的数位&mdash;&mdash;千位和万位，可以按数位顺序表读数、写数&hellip;&hellip;&quot;;
        });
        document.getElementById('btn-check').addEventListener('click', checkAnswer);
        practiceInput.addEventListener('keypress', (e) =&gt; {
            if (e.key === 'Enter') checkAnswer();
        });

        // 初始播放标题语音
        window.addEventListener('click', () =&gt; {

      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    document.addEventListener('DOMContentLoaded', function () {

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
