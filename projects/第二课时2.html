  <!-- 自动调整iframe高度 -->
  <script>
    function resizeIframe(iframe) {
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        var body = doc.body;
        
        // 移除h-screen类，让内容自适应高度
        body.classList.remove('h-screen');
        body.style.height = 'auto';
        body.style.minHeight = '100vh';
        
        // 计算实际内容高度
        var height = Math.max(
          body.scrollHeight,
          body.offsetHeight,
          doc.documentElement.scrollHeight,
          doc.documentElement.offsetHeight
        );
        if (height > 500) {
          iframe.style.height = height + 'px';
        }
      } catch(e) {
        console.log('无法获取iframe内容高度，使用默认高度');
      }
    }
    
    window.addEventListener('load', function() {
      var iframe = document.querySelector('.content-iframe');
      if (iframe) {
        // 延迟执行，等待srcdoc加载完成
        setTimeout(function() {
          resizeIframe(iframe);
        }, 500);
        // iframe加载完成后再调整一次
        iframe.addEventListener('load', function() {
          resizeIframe(iframe);
        });
      }
    });
  </script>

    &lt;script&gt;
        // 状态管理
        const state = {
            mode: 'observe', // 'observe' or 'practice'
            currentNum: 4090,
            practiceTarget: 0,
            practiceAnswers: { prev: null, next: null },
            isDragging: false
        };

        // DOM 元素
        const elements = {
            observeMode: document.getElementById('observe-mode'),
            practiceMode: document.getElementById('practice-mode'),
            btnObserve: document.getElementById('btn-observe'),
            btnPractice: document.getElementById('btn-practice'),
            btnReset: document.getElementById('btn-reset'),
            sliderThumb: document.getElementById('slider-thumb'),
            currentNumDisplay: document.getElementById('current-num-display'),
            prevNum: document.getElementById('prev-num'),
            nextNum: document.getElementById('next-num'),
            dialogText: document.getElementById('dialog-text'),
            targetNum: document.getElementById('target-num'),
            optionsContainer: document.getElementById('options-container'),
            dropPrev: document.getElementById('drop-prev'),
            dropNext: document.getElementById('drop-next'),
            audios: {
                intro: document.getElementById('audio-intro'),
                correct: document.getElementById('audio-correct'),
                wrong: document.getElementById('audio-wrong')
            }
        };

        // 初始化
        function init() {
            updateObserveDisplay();
            setupEventListeners();
            playAudio('intro');
            
            // 入场动画
            anime({
                targets: '.glass-card',
                translateY: [50, 0],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutExpo',
                delay: anime.stagger(200)
            });
        }

        // 更新观察模式显示
        function updateObserveDisplay() {
            elements.currentNumDisplay.textContent = state.currentNum;
            elements.prevNum.textContent = state.currentNum - 1;
            elements.nextNum.textContent = state.currentNum + 1;
            
            // 简单的缩放反馈
            anime({
                targets: '#current-num-display',
                scale: [1.1, 1.2, 1.1],
                duration: 300,
                easing: 'easeInOutQuad'
            });
        }

        // 播放音频
        function playAudio(key) {
            Object.values(elements.audios).forEach(a =&gt; { a.pause(); a.currentTime = 0; });
            elements.audios[key].play().catch(e =&gt; console.log(&quot;Audio play blocked&quot;));
        }

        // 模式切换
        function switchMode(mode) {
            state.mode = mode;
            if (mode === 'observe') {
                elements.observeMode.classList.remove('hidden');
                elements.practiceMode.classList.add('hidden');
                elements.btnObserve.classList.add('bg-green-700', 'text-white', 'scale-105');
                elements.btnObserve.classList.remove('bg-white', 'text-green-700');
                elements.btnPractice.classList.remove('bg-green-700', 'text-white', 'scale-105');
                elements.btnPractice.classList.add('bg-white', 'text-green-700');
                elements.dialogText.textContent = &quot;拖动滑块，看看数字的前后邻居是谁？&quot;;
            } else {
                elements.observeMode.classList.add('hidden');
                elements.practiceMode.classList.remove('hidden');
                elements.btnPractice.classList.add('bg-green-700', 'text-white', 'scale-105');
                elements.btnPractice.classList.remove('bg-white', 'text-green-700');
                elements.btnObserve.classList.remove('bg-green-700', 'text-white', 'scale-105');
                elements.btnObserve.classList.add('bg-white', 'text-green-700');
                initPractice();
            }
        }

        // 练习模式初始化
        function initPractice() {
            state.practiceTarget = Math.floor(Math.random() * 8000) + 1000;
            state.practiceAnswers = { prev: null, next: null };
            elements.targetNum.textContent = state.practiceTarget;
            elements.dropPrev.textContent = '?';
            elements.dropNext.textContent = '?';
            elements.dropPrev.className = 'drop-zone w-24 h-16 text-2xl font-bold text-green-700';
            elements.dropNext.className = 'drop-zone w-24 h-16 text-2xl font-bold text-green-700';
            
            elements.dialogText.textContent = `请找出 ${state.practiceTarget} 的前一个数和后一个数。`;

            // 生成选项
            const options = [
                state.practiceTarget - 1,
                state.practiceTarget + 1,
                state.practiceTarget - 10,
                state.practiceTarget + 10
            ].sort(() =&gt; Math.random() - 0.5);

            elements.optionsContainer.innerHTML = '';
            options.forEach(val =&gt; {
                const opt = document.createElement('div');
                opt.className = 'draggable bg-white border-2 border-green-200 rounded-xl px-4 py-2 text-xl font-bold text-green-800 shadow-sm hover:border-green-500 transition-colors';
                opt.textContent = val;
                opt.draggable = true;
                
                opt.addEventListener('dragstart', (e) =&gt; {
                    e.dataTransfer.setData('text/plain', val);
                    opt.classList.add('opacity-50');
                });
                opt.addEventListener('dragend', () =&gt; opt.classList.remove('opacity-50'));
                
                elements.optionsContainer.appendChild(opt);
            });
        }

        // 拖拽处理
        function setupEventListeners() {
            // 滑块逻辑 (观察模式)
            let isDraggingSlider = false;
            const sliderContainer = elements.sliderThumb.parentElement;

            const handleMove = (clientX) =&gt; {
                if (!isDraggingSlider) return;
                const rect = sliderContainer.getBoundingClientRect();
                let pos = (clientX - rect.left) / rect.width;
                pos = Math.max(0, Math.min(1, pos));
                elements.sliderThumb.style.left = `${pos * 100}%`;
                
                // 映射到 1000 - 9999
                const newNum = Math.round(1000 + pos * 8999);
                if (newNum !== state.currentNum) {
                    state.currentNum = newNum;
                    updateObserveDisplay();
                }
            };

            elements.sliderThumb.addEventListener('mousedown', () =&gt; isDraggingSlider = true);
            window.addEventListener('mousemove', (e) =&gt; handleMove(e.clientX));
            window.addEventListener('mouseup', () =&gt; isDraggingSlider = false);

            // 触摸支持
            elements.sliderThumb.addEventListener('touchstart', () =&gt; isDraggingSlider = true);
            window.addEventListener('touchmove', (e) =&gt; handleMove(e.touches[0].clientX));
            window.addEventListener('touchend', () =&gt; isDraggingSlider = false);

            // 练习模式拖放
            [elements.dropPrev, elements.dropNext].forEach(zone =&gt; {
                zone.addEventListener('dragover', (e) =&gt; {
                    e.preventDefault();
                    zone.classList.add('active');
                });
                zone.addEventListener('dragleave', () =&gt; zone.classList.remove('active'));
                zone.addEventListener('drop', (e) =&gt; {
                    e.preventDefault();
                    zone.classList.remove('active');
                    const val = parseInt(e.dataTransfer.getData('text/plain'));
                    handleDrop(zone.id, val);
                });
            });

            // 按钮点击
            elements.btnObserve.addEventListener('click', () =&gt; switchMode('observe'));
            elements.btnPractice.addEventListener('click', () =&gt; switchMode('practice'));
            elements.btnReset.addEventListener('click', () =&gt; {
                if (state.mode === 'observe') {
                    state.currentNum = 4090;
                    elements.sliderThumb.style.left = '50%';
                    updateObserveDisplay();
                } else {
                    initPractice();
                }
            });
        }

        function handleDrop(zoneId, value) {
            const isPrev = zoneId === 'drop-prev';
            const correctValue = isPrev ? state.practiceTarget - 1 : state.practiceTarget + 1;
            const zone = document.getElementById(zoneId);

            if (value === correctValue) {
                zone.textContent = value;
                zone.classList.add('bg-green-100', 'border-green-500', 'border-solid');
                zone.classList.remove('border-dashed');
                state.practiceAnswers[isPrev ? 'prev' : 'next'] = value;
                
                playAudio('correct');
                elements.dialogText.textContent = &quot;太棒了！你找对了！&quot;;
                
                // 检查是否全部完成
                if (state.practiceAnswers.prev &amp;&amp; state.practiceAnswers.next) {
                    setTimeout(() =&gt; {
                        elements.dialogText.textContent = &quot;全对啦！你真聪明！3秒后开始下一题...&quot;;
                        setTimeout(initPractice, 3000);
                    }, 500);
                }
            } else {
                playAudio('wrong');
                elements.dialogText.textContent = &quot;再试一次，前一个数是减1，后一个数是加1哦。&quot;;
                anime({
                    targets: zone,
                    translateX: [0, -10, 10, -10, 10, 0],
                    duration: 400,
                    easing: 'linear'
                });
            }
        }

        init();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

            padding: 0 5px;
          ">×</button>
        </div>
      </div>
      <div id="image-content" style="
        text-align: center;
        overflow: hidden;
      ">
        <img id="viewer-image" src="assets/第二课时2.png" alt="教材分析图" style="
          width: 260px;
          border-radius: 8px;
          cursor: pointer;
          transition: width 0.15s ease;
        " onclick="openFullImage( + image_path + )" onwheel="handleWheel(event)">
      </div>
    </div>

    <!-- 全屏图片模态框 -->
    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    ">
      <img id="full-image" src="" style="
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;
      " onwheel="handleFullWheel(event)" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
      <button onclick="closeFullImage()" style="
        position: absolute;
        top: 20px;
        right: 20px;
        background: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 24px;
        cursor: pointer;
        z-index: 10;
      ">×</button>
      <div style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.9);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
</body>

</html>
