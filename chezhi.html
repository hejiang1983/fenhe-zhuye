            line-height: 1.6;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 4px;
            text-align: left; /* 设为左对齐，让列表更美观 */
        }

        .input-group {
            margin: 40px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        .hanzi-input {
            width: 100%;
            height: 80px;
            font-size: 36px;
            text-align: center;
            border: 3px solid var(--gold);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .hanzi-input:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 15px rgba(194,39,39,0.3);
            outline: none;
        }

        button {
            background: linear-gradient(135deg, var(--crimson), #a61b1b);
            color: white;
            padding: 18px 45px;
            font-size: 1.4em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 30px auto;
            display: block;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* 修复核心：当下面三个容器没有内容时，直接隐藏，避免显示空边框和背景 */
        #result:empty,
        #prediction:empty,
        #error:empty {
            display: none;
        }

        #result {
            background: rgba(245,238,220,0.9);
            border: 2px dashed var(--gold);
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
        }

        .prediction {
            font-size: 1.1em;
            line-height: 1.8;
            color: var(--ink);
            padding: 25px;
            border: 1px solid var(--gold);
            border-radius: 8px;
            background: white;
            margin-bottom: 20px;
        }

        .error {
            color: #a61b1b;
            background: rgba(255,235,235,0.9);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stroke-detail {
            margin: 10px 0;
            padding: 8px;
            background: #f3f3f3;
            border-radius: 4px;
        }

        .calculation-formula {
            margin: 15px 0;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 6px;
        }
    </style>
</head>

        // 修改后的本地测算笔画函数，不再使用 fetch 网络请求
        async function getStrokeCount(character) {
            try {
                // 使用 cnchar 库直接在本地计算笔画
                const stroke = cnchar.stroke(character);
                if (typeof stroke === 'number' && stroke > 0) {
                    return stroke;
                }
                throw new Error(`无法识别汉字「${character}」的笔画`);
            } catch (error) {
                throw new Error(`笔画计算失败: ${error.message}`);
            }
        }

        async function calculate() {
            const inputs = document.querySelectorAll('.hanzi-input');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            const predictionDiv = document.getElementById('prediction');
            
            errorDiv.textContent = '';
            resultDiv.textContent = '';
            predictionDiv.textContent = '';

            const characters = Array.from(inputs, i => i.value.trim());
            if (characters.some(c => !/^[\u4e00-\u9fa5]$/.test(c))) {
                errorDiv.textContent = '请输入三个有效汉字';
                return;
            }

            try {
                const strokes = await Promise.all(characters.map(getStrokeCount));
                const total = strokes[0] * 100 + strokes[1] * 10 + strokes[2];
                const remainder = total % 215;
                
                let signNumber, predictionIndex;
                if (remainder === 0) {
                    signNumber = 215;
                    predictionIndex = 214;
                } else {
                    signNumber = remainder;
                    predictionIndex = remainder - 1;
                }

                resultDiv.innerHTML = `
                    <div class="stroke-detail">汉字「${characters[0]}」笔画数：${strokes[0]}</div>
                    <div class="stroke-detail">汉字「${characters[1]}」笔画数：${strokes[1]}</div>
                    <div class="stroke-detail">汉字「${characters[2]}」笔画数：${strokes[2]}</div>
                    <div class="calculation-formula">
                        ◈ 计算公式：<br>
                        (${strokes[0]} × 100) + (${strokes[1]} × 10) + ${strokes[2]} = ${total}<br>
                        ◈ 最终余数：<br>
                        ${total} ÷ 215 = ${Math.floor(total/215)} 余 ${remainder}
                    </div>
                    <div style="margin-top:20px; color:var(--crimson); font-weight:bold;">
                        ✦ 对应签号：第 ${signNumber} 签 ✦
                    </div>
                `;

                predictionDiv.textContent = PREDICTIONS[predictionIndex] || "此签解文暂缺";
                
            } catch (error) {
                errorDiv.textContent = '❗ ' + error.message;
            }
        }

        document.querySelectorAll('.hanzi-input').forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^\u4e00-\u9fa5]/g, '');
                if (this.value.length > 1) this.value = this.value[0];
            });
        });
    </script>
</body>
</html>
