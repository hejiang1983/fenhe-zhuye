<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏合集</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 0;
            background-color: white;
        }
        h1 {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            margin: 0;
            padding: 20px 10px;
            background-color: #2c3e50;
            color: white;
            height: 100%;
        }
        .tabs {
            display: flex;
            flex-direction: column;
            width: 150px;
            background-color: #f1f1f1;
            border-right: 1px solid #ddd;
        }
        .tab {
            padding: 15px 10px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            transition: all 0.3s;
            text-align: center;
        }
        .tab:hover {
            background-color: #e1e1e1;
        }
        .tab.active {
            background-color: #3498db;
            color: white;
        }
        .tab-content-container {
            flex: 1;
            overflow: hidden;
        }
        .tab-content {
            display: none;
            height: 100%;
            width: 100%;
        }
        .tab-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>质数和合数</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="openTab(event, 'square')">正方形排列</div>
            <div class="tab" onclick="openTab(event, 'rabbit')">小兔子回家</div>
            <div class="tab" onclick="openTab(event, 'prime-sieve')">筛出质数</div>
            <div class="tab" onclick="openTab(event, 'find-prime')">找质数游戏</div>
        </div>
        
        <div class="tab-content-container">
            <div id="square" class="tab-content active">
            <iframe data-src="正方形排列.html"></iframe>
        </div>
        
            <div id="rabbit" class="tab-content">
            <iframe data-src="小兔子回家.html"></iframe>
        </div>
        
            <div id="prime-sieve" class="tab-content">
            <iframe data-src="筛出质数.html"></iframe>
        </div>
        
            <div id="find-prime" class="tab-content">
            <iframe data-src="找质数游戏.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Load default tab content when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const defaultTab = document.querySelector('.tab-content.active iframe');
            if (defaultTab && !defaultTab.src && defaultTab.dataset.src) {
                defaultTab.src = defaultTab.dataset.src;
            }
        });

        function openTab(evt, tabName) {
            // Hide all tab contents
            const tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            
            // Remove active class from all tabs
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            
            // Show current tab and add active class
            const activeTab = document.getElementById(tabName);
            activeTab.classList.add("active");
            evt.currentTarget.classList.add("active");
            
            // Lazy load iframe content
            const iframe = activeTab.querySelector("iframe");
            if (iframe && !iframe.src && iframe.dataset.src) {
                iframe.src = iframe.dataset.src;
            }
        }
    </script>
</body>
</html>
