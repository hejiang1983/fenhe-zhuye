    &lt;script&gt;
        let currentScene = 'more'; // 'more' or 'times'
        const MAX_WIDTH_VAL = 40; // Max units for 100% width

        function setScene(scene) {
            currentScene = scene;
            document.getElementById('btnMore').classList.toggle('active', scene === 'more');
            document.getElementById('btnTimes').classList.toggle('active', scene === 'times');
            document.getElementById('controlMore').classList.toggle('hidden', scene !== 'more');
            document.getElementById('controlTimes').classList.toggle('hidden', scene !== 'times');
            updateValues();
        }

        function updateValues() {
            const standard = parseInt(document.getElementById('rangeStandard').value);
            const diff = parseInt(document.getElementById('rangeDiff').value);
            const multiple = parseInt(document.getElementById('rangeMultiple').value);

            document.getElementById('valStandard').innerText = standard;
            document.getElementById('valDiff').innerText = diff;
            document.getElementById('valMultiple').innerText = multiple;
            
            document.getElementById('displayStandard').innerText = standard;

            // 建立联系逻辑
            const connectionTip = document.getElementById('connectionTip');
            if (diff === standard * (multiple - 1)) {
                connectionTip.innerHTML = `✨ &lt;strong&gt;太棒了！你发现了联系：&lt;/strong&gt;&lt;br&gt;当比松鼠多 &lt;b&gt;${diff}&lt;/b&gt; 只时，兔子的总数正好是松鼠的 &lt;b&gt;${multiple}&lt;/b&gt; 倍！`;
                connectionTip.classList.replace('bg-blue-50', 'bg-green-50');
                connectionTip.classList.replace('border-blue-100', 'border-green-100');
                connectionTip.classList.replace('text-blue-700', 'text-green-700');
            } else {
                connectionTip.innerHTML = `💡 &lt;strong&gt;探索联系：&lt;/strong&gt;&lt;br&gt;试着调整滑块，看看多出多少只时，兔子正好是松鼠的 &lt;b&gt;${multiple}&lt;/b&gt; 倍？`;
                connectionTip.classList.replace('bg-green-50', 'bg-blue-50');
                connectionTip.classList.replace('border-green-100', 'border-blue-100');
                connectionTip.classList.replace('text-green-700', 'text-blue-700');
            }

            renderBars(standard, diff, multiple);
        }

        function renderBars(standard, diff, multiple) {
            const container = document.getElementById('rabbitBarContainer');
            container.innerHTML = '';
            
            let total = 0;
            const standardWidth = (standard / MAX_WIDTH_VAL) * 100;
            
            // Update Squirrel Bar
            anime({
                targets: '#barStandard',
                width: standardWidth + '%',
                duration: 500,
                easing: 'easeOutQuad'
            });
            document.getElementById('barStandard').innerText = standard;

            if (currentScene === 'more') {
                total = standard + diff;
                const diffWidth = (diff / MAX_WIDTH_VAL) * 100;
                
                container.innerHTML = `
                    &lt;div class=&quot;bar-segment standard-bar&quot; style=&quot;width: ${standardWidth}%&quot;&gt;${standard}&lt;/div&gt;
                    &lt;div id=&quot;animDiff&quot; class=&quot;bar-segment diff-bar&quot; style=&quot;left: ${standardWidth}%; width: 0%&quot;&gt;${diff}&lt;/div&gt;
                `;
                
                anime({
                    targets: '#animDiff',
                    width: diffWidth + '%',
                    duration: 800,
                    easing: 'easeOutElastic(1, .8)'
                });

                document.getElementById('relationText').innerText = `比松鼠多 ${diff} 只`;
                document.getElementById('formulaText').innerText = `${standard} + ${diff} = ${total}`;
                document.getElementById('tipText').innerText = '在&ldquo;比多&rdquo;关系中，我们将松鼠看作标准，兔子是在标准的基础上增加了一部分。';
            } else {
                total = standard * multiple;
                
                for (let i = 0; i &lt; multiple; i++) {
                    const seg = document.createElement('div');
                    seg.className = 'bar-segment multiple-bar';
                    seg.style.left = (i * standardWidth) + '%';
                    seg.style.width = '0%';
                    seg.innerText = standard;
                    container.appendChild(seg);

                    anime({
                        targets: seg,
                        width: standardWidth + '%',
                        delay: i * 150,
                        duration: 600,
                        easing: 'easeOutQuad'
                    });
                }

                document.getElementById('relationText').innerText = `是松鼠只数的 ${multiple} 倍`;
                document.getElementById('formulaText').innerText = `${standard} &times; ${multiple} = ${total}`;
                document.getElementById('tipText').innerText = '在&ldquo;倍数&rdquo;关系中，我们将松鼠看作&ldquo;1份&rdquo;，兔子有这样的几份，就是它的几倍。';
            }

            // Animate Total Number
            const totalDisplay = document.getElementById('displayTotal');
            const obj = { val: parseInt(totalDisplay.innerText) || 0 };
            anime({
                targets: obj,
                val: total,
                round: 1,
                duration: 800,
                easing: 'linear',
                update: () =&gt; { totalDisplay.innerText = obj.val; }
            });
        }

        function playAudio(id) {
            const audio = document.getElementById('audio' + id);
            audio.currentTime = 0;
            audio.play();
        }

        // Initial Render
        updateValues();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    document.addEventListener('DOMContentLoaded', function () {

      const startButton = document.querySelector('.jump-button')

          // 按钮的 onclick 会处理跳转
        })
      }


    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

// 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>

    <div id="image-viewer" style="

    ">
      <div style="

          <button onclick="resetImageZoom()" style="

          ">重置</button>
          <button onclick="hideImageViewer()" style="

          width: 260px;

      </div>

    <!-- 全屏图片模态框 -->
    <div id="full-image-modal" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    ">
      <img id="full-image" src="" style="
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        cursor: grab;
        transition: transform 0.1s ease;
      " onwheel="handleFullWheel(event)" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
      <button onclick="closeFullImage()" style="
        position: absolute;
        top: 20px;
        right: 20px;
        background: white;
        border: none;
        border-radius: 50%;

        z-index: 10;
      ">×</button>
      <div style="
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.9);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        color: #333;
        z-index: 10;
      "><span id="full-zoom-level">100%</span> | 滚轮缩放 | 拖拽移动</div>
    </div>

    <script>
    var currentScale = 1;
    var fullScale = 1;
    var isDragging = false;
    var dragStartX, dragStartY;
    var baseWidth = 260;
    var translateX = 0, translateY = 0;

    function showImageViewer() {
      document.getElementById('play-btn-container').style.display = 'none';
      document.getElementById('image-viewer').style.display = 'block';
      resetImageZoom();
    }
    function hideImageViewer() {
      document.getElementById('image-viewer').style.display = 'none';
      document.getElementById('play-btn-container').style.display = 'block';
      resetImageZoom();
    }
    function handleWheel(e) {
      e.preventDefault();
      var img = document.getElementById('viewer-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      currentScale = Math.min(Math.max(0.5, currentScale + delta), 4);
      // 直接调整图片宽度，容器会自动适应
      var newWidth = baseWidth * currentScale;
      img.style.width = newWidth + 'px';
      document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }
    function resetImageZoom() {
      currentScale = 1;
      var img = document.getElementById('viewer-image');
      if (img) {
        img.style.width = baseWidth + 'px';
      }
      document.getElementById('zoom-level').textContent = '100%';
    }
    function openFullImage(src) {
      var modal = document.getElementById('full-image-modal');
      var img = document.getElementById('full-image');
      img.src = src;
      modal.style.display = 'flex';
      fullScale = 1;
      translateX = 0;
      translateY = 0;
      img.style.transform = 'scale(1)';
      document.getElementById('full-zoom-level').textContent = '100%';
    }
    function closeFullImage() {
      document.getElementById('full-image-modal').style.display = 'none';
      fullScale = 1;
      isDragging = false;
      translateX = 0;
      translateY = 0;
    }
    function handleFullWheel(e) {
      e.preventDefault();
      var img = document.getElementById('full-image');
      var delta = e.deltaY > 0 ? -0.2 : 0.2;
      fullScale = Math.min(Math.max(0.5, fullScale + delta), 5);
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
      document.getElementById('full-zoom-level').textContent = Math.round(fullScale * 100) + '%';
    }
    function startDrag(e) {
      if (fullScale <= 1) return;
      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      var img = document.getElementById('full-image');
      img.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function doDrag(e) {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      var img = document.getElementById('full-image');
      img.style.transform = 'scale(' + fullScale + ') translate(' + translateX + 'px, ' + translateY + 'px)';
    }
    function endDrag() {
      isDragging = false;
      var img = document.getElementById('full-image');
      if (img) img.style.cursor = 'grab';
    }
    </script>
